<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e1a">
<title>🎲 サイコロ旅</title>
<style>
:root{
  --bg:#0f0e1a;--s1:#181727;--s2:#201f32;--bd:#2c2b44;
  --tx:#e2ddf0;--dim:#7a768f;--am:#e0a020;--abg:rgba(224,160,32,.13);
  --re:#d94040;--gr:#2eb870;
  --r:12px;--font:'Hiragino Sans','Noto Sans JP',sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:15px}
button,input{font-family:var(--font)}
#app{display:flex;flex-direction:column;height:100dvh}
#hdr{flex-shrink:0;padding:calc(10px + var(--sat)) 14px 10px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
#hdr-title{font-size:18px;font-weight:700}
#tabs{flex-shrink:0;display:flex;background:var(--bg);border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:10px 4px;background:none;border:none;color:var(--dim);font-size:13px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;cursor:pointer}
.tab.on{color:var(--am);border-bottom-color:var(--am)}
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pn{display:none;padding:13px 12px calc(28px + var(--sab))}
.pn.on{display:block}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:12px}
.lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.g{margin-bottom:11px}
.g label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.row{display:flex;gap:7px;align-items:center}
input[type=text]{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
input:focus{border-color:var(--am)}
.ibtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:15px;flex-shrink:0;cursor:pointer}
.btn{display:block;width:100%;padding:12px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;transition:transform .1s;margin-bottom:8px;cursor:pointer;text-align:center}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--am);color:#0f0e1a}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-ok{background:var(--gr);color:#0f0e1a}
.pc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.pc-route{font-size:15px;font-weight:700}
.pc-cur{font-size:13px;color:var(--am);margin-top:3px}
.pc-sub{font-size:11px;color:var(--dim);margin-top:2px}
.dgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.db{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);font-size:19px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,background .1s}
.db:active{transform:scale(.82);background:var(--bd)}
.d1{border-color:#7a2020}.d2{border-color:#7a4010}.d3{border-color:#6b5500}
.d4{border-color:#1a5c2e}.d5{border-color:#1e3e7a}.d6{border-color:#4a1a7a}
.cbanner{border-radius:var(--r);padding:14px;margin-bottom:12px;text-align:center;border:1px solid var(--bd)}
.cb-ic{font-size:28px;margin-bottom:2px}.cb-lbl{font-size:20px;font-weight:700}.cb-desc{font-size:12px;opacity:.75;margin-top:2px}
.c1{background:rgba(217,64,64,.14);border-color:rgba(217,64,64,.3);color:#ff8080}
.c2{background:rgba(220,90,20,.14);border-color:rgba(220,90,20,.3);color:#ffaa60}
.c3{background:rgba(200,150,0,.14);border-color:rgba(200,150,0,.3);color:#ffcc40}
.c4{background:rgba(46,184,112,.14);border-color:rgba(46,184,112,.3);color:#60eeaa}
.c5{background:rgba(64,128,224,.14);border-color:rgba(64,128,224,.3);color:#80b4ff}
.c6{background:rgba(140,60,230,.14);border-color:rgba(140,60,230,.3);color:#cc90ff}
.rc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:9px}
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.rdest{font-size:16px;font-weight:700}
.rtime{font-size:12px;color:var(--dim);margin-left:8px;white-space:nowrap;margin-top:3px}
.rinfo{font-size:12px;color:var(--dim);margin-bottom:9px}
.rdata{font-size:11px;color:var(--dim);opacity:.7;margin-bottom:6px}
.ra{display:flex;gap:6px}
.ra a,.ra button{flex:1;padding:9px 4px;font-size:13px;font-weight:700;border-radius:8px;text-align:center;display:block;text-decoration:none;border:none;cursor:pointer;font-family:var(--font);transition:transform .1s}
.ra a:active,.ra button:active{transform:scale(.95)}
.bmap{background:var(--s2);color:var(--tx);border:1px solid var(--bd)!important}
.bgo{background:var(--am);color:#0f0e1a}
.conf{border-left:3px solid var(--am);background:var(--s1);border-radius:0 var(--r) var(--r) 0;border-right:1px solid var(--bd);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:13px;margin-bottom:12px}
.li{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.lih{display:flex;justify-content:space-between;margin-bottom:2px}
.lin{font-size:11px;color:var(--dim)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;gap:14px;color:var(--dim);font-size:14px}
.sp{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--am);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.em{text-align:center;padding:44px 12px;color:var(--dim)}
.done{text-align:center;padding:40px 14px}
.done .big{font-size:52px;margin-bottom:12px}
#toast{position:fixed;bottom:calc(64px + var(--sab));left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);color:var(--tx);padding:9px 20px;border-radius:20px;font-size:13px;border:1px solid var(--bd);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.src-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:4px;border:1px solid}
.src-hr{background:rgba(46,184,112,.12);color:var(--gr);border-color:rgba(46,184,112,.35)}
.src-st{background:rgba(64,128,224,.12);color:#80b4ff;border-color:rgba(64,128,224,.35)}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">
  <div id="hdr">
    <span id="hdr-title">🎲 サイコロ旅</span>
    <span id="apistatus" style="font-size:11px;color:var(--dim)">読込中…</span>
  </div>
  <div id="tabs">
    <button class="tab on" data-t="game" onclick="swTab('game')">📍 ゲーム</button>
    <button class="tab" data-t="log"  onclick="swTab('log')">📜 ログ</button>
    <button class="tab" data-t="share" onclick="swTab('share')">📤 共有</button>
  </div>
  <div id="scr">
    <div id="pn-game" class="pn on">
      <div id="st-setup">
        <div class="card">
          <div class="g">
            <label>出発地（駅名・都市名）</label>
            <div class="row">
              <input type="text" id="orig" placeholder="例: 浜松駅">
              <button class="ibtn" onclick="doGPS()">📍</button>
            </div>
          </div>
          <div class="g" style="margin-bottom:0">
            <label>目的地</label>
            <input type="text" id="dest" placeholder="例: 北海道 / 札幌駅">
          </div>
        </div>
        <button class="btn btn-p" onclick="startGame()">🎲 ゲーム開始！</button>
      </div>

      <div id="st-dice" style="display:none">
        <div id="pc" class="pc"></div>
        <div class="card">
          <div class="lbl">ダイスを振って番号を押す</div>
          <div id="dgrid" class="dgrid"></div>
        </div>
        <button class="btn btn-s" onclick="endGame()">🏁 終了</button>
      </div>

      <div id="st-cands" style="display:none">
        <div id="cban" class="cbanner"></div>
        <div id="clist"></div>
        <button class="btn btn-s mt8" onclick="backToDice()">← 別の出目を選ぶ</button>
      </div>

      <div id="st-travel" style="display:none">
        <div id="confwrap"></div>
        <button class="btn btn-ok" onclick="arrive()">📍 到着！次のダイスへ</button>
        <div class="lbl" style="margin-top:14px">これまでの旅路</div>
        <div id="thist"></div>
      </div>

      <div id="st-done" style="display:none">
        <div class="done">
          <div class="big">🎉</div>
          <h2 style="margin-bottom:8px">ゴール！</h2>
          <p id="donetxt" style="font-size:14px;color:var(--dim);line-height:1.6;margin-bottom:22px"></p>
          <button class="btn btn-p" onclick="resetGame()">🎲 新しい旅へ</button>
        </div>
      </div>
    </div>

    <div id="pn-log" class="pn"><div id="logc"></div></div>

    <div id="pn-share" class="pn">
      <div class="card">
        <h3 style="margin-bottom:10px">この旅を共有</h3>
        <p style="font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:14px">旅の状態をURLにエンコードします。受け取った側は読み取り専用で閲覧できます。</p>
        <button class="btn btn-p" onclick="doShare()">🔗 共有URLをコピー</button>
      </div>
      <div id="shareout"></div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════
   DICE DEFINITIONS
   ══════════════════════════════════════════════ */
const DICE_DEF = {
  1:{label:'最悪',   desc:'徒歩・超ローカルのみ',     icon:'💀',strategy:'detour',
     modes:['walk','local_bus']},
  2:{label:'低速',   desc:'在来線・路線バス中心',      icon:'🐢',strategy:'slow',

  walk:            {range:4,    spd:4,   label:'徒歩',        icon:'🚶',rf:[],    rt:[]},
  local_bus:       {range:35,   spd:22,  label:'路線バス',    icon:'🚌',rf:[],    rt:[]},

/* ══════════════════════════════════════════════
   HEARTRAILS DATA LAYER
   GitHub Pages = HTTPS = CORSが通る
   ══════════════════════════════════════════════ */
const _hrCache = new Map();

async function fetchNearby(lat, lng, km = 200) {
  const key = `${lat.toFixed(2)},${lng.toFixed(2)}`;
  if (_hrCache.has(key)) return _hrCache.get(key);
  try {
    const url = `https://express.heartrails.com/api/json?method=getStations&x=${lng}&y=${lat}&distance=${km}`;
    const r = await Promise.race([
      fetch(url),
      new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 10000))
    ]);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const stations = (d?.response?.station || []).map(s => ({
      id:   's_' + s.name.replace(/\s/g,'') + '_' + s.line.slice(0,4),
      name: s.name + '駅',
      base: s.name,
      lat:  parseFloat(s.y),
      lng:  parseFloat(s.x),
      line: s.line,
      pref: s.prefecture,
      dist: parseFloat(s.geo_distance || 0),
      m:    inferModes(s),
      src:  'heartrails',
    }));
    _hrCache.set(key, stations);
    return stations;
  } catch(e) {
    console.warn('[fetchNearby]', e.message);
    return [];
  }
}

// 路線名から乗り換えタイプを推定
function inferModes(s) {
  const line = s.line || '';
  const m = ['L']; // 在来線は基本あり
  if (/新幹線/.test(line))                        m.push('S');
  if (/特急|ライナー|あずさ|しらさぎ|サンダー|しおかぜ|南風|つばめ|ソニック|かもめ/.test(line)) m.push('E');
  if (/空港/.test(s.name))                        m.push('A');
  if (s.name.includes('空港') || line.includes('空港')) m.push('A');
  return m.join('');
}

/* ══════════════════════════════════════════════
   GEOCODE  (Heartrails 駅名検索)
   ══════════════════════════════════════════════ */
const GEO_FALLBACK = {
  '北海道':'sapporo','札幌':{lat:43.0687,lng:141.3508},'函館':{lat:41.7737,lng:140.7268},
  '旭川':{lat:43.7700,lng:142.3650},'釧路':{lat:42.9849,lng:144.3820},
  '青森':{lat:40.8246,lng:140.7400},'仙台':{lat:38.2682,lng:140.8694},
  '秋田':{lat:39.7196,lng:140.1023},'盛岡':{lat:39.7036,lng:141.1527},

  '横浜':{lat:35.4657,lng:139.6221},'名古屋':{lat:35.1709,lng:136.8815},
  '浜松':{lat:34.7108,lng:137.7261},'静岡':{lat:34.9769,lng:138.3831},
  '大阪':{lat:34.7026,lng:135.4959},'京都':{lat:34.9850,lng:135.7582},
  '神戸':{lat:34.6790,lng:135.1950},'広島':{lat:34.3853,lng:132.4553},
  '岡山':{lat:34.6552,lng:133.9195},'福岡':{lat:33.5904,lng:130.4017},
  '博多':{lat:33.5898,lng:130.4201},'熊本':{lat:32.7903,lng:130.7460},
  '鹿児島':{lat:31.5794,lng:130.5571},'那覇':{lat:26.2124,lng:127.6809},
  '金沢':{lat:36.5784,lng:136.6481},'富山':{lat:36.7003,lng:137.2133},
  '新潟':{lat:37.9127,lng:139.0595},'長野':{lat:36.6448,lng:138.1880},
};
const SAPPORO_COORD = {lat:43.0687,lng:141.3508};

async function geocode(text) {
  const q = text.replace(/駅$/,'').trim();

  // Heartrails 駅名検索
  try {
    const url = `https://express.heartrails.com/api/json?method=getStations&name=${encodeURIComponent(q)}`;
    const r = await Promise.race([
      fetch(url),
      new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 8000))
    ]);
    if (r.ok) {
      const d = await r.json();
      const st = d?.response?.station;
      if (st?.length) {
        const s = st[0];
        return {
          id:   'gc_'+s.name, name: s.name+'駅',
          lat:  parseFloat(s.y), lng: parseFloat(s.x),
          line: s.line, m: inferModes(s), src:'heartrails'
        };
      }
    }
  } catch(e) { console.warn('[geocode]', e.message); }

  // フォールバック
  for (const [key, val] of Object.entries(GEO_FALLBACK)) {
    if (text.includes(key) || key.includes(q)) {
      const coord = typeof val === 'string' ? SAPPORO_COORD : val;
      return {id:'fb_'+key, name:text, lat:coord.lat, lng:coord.lng, m:'EL', src:'fallback'};
    }
  }
  return null;
}

/* ══════════════════════════════════════════════
   GPS
   ══════════════════════════════════════════════ */
async function doGPS() {
  if (!navigator.geolocation) { toast('GPSが使えません'); return; }
  toast('📍 GPS取得中…');
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:la, longitude:ln} = pos.coords;
    try {
      const url = `https://express.heartrails.com/api/json?method=getStations&x=${ln}&y=${la}&distance=5`;
      const r = await Promise.race([fetch(url), new Promise((_,rej)=>setTimeout(()=>rej(),6000))]);
      const d = await r.json();
      const st = d?.response?.station;
      if (st?.length) {
        document.getElementById('orig').value = st[0].name + '駅';
        toast('📍 ' + st[0].name + '駅');
      } else {
        document.getElementById('orig').value = `${la.toFixed(4)},${ln.toFixed(4)}`;
        toast('📍 座標を取得しました');
      }
    } catch { document.getElementById('orig').value = `${la.toFixed(4)},${ln.toFixed(4)}`; toast('📍 座標を取得しました'); }
  }, () => toast('GPS取得に失敗しました'));
}

/* ══════════════════════════════════════════════
   GEO UTILS
   ══════════════════════════════════════════════ */
function distKm(a,b){
  const R=6371,dLa=(b.lat-a.lat)*Math.PI/180,dLn=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLa/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function bearing(from,to){
  const dLn=(to.lng-from.lng)*Math.PI/180,la1=from.lat*Math.PI/180,la2=to.lat*Math.PI/180;
  return Math.atan2(Math.sin(dLn)*Math.cos(la2),Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLn))*180/Math.PI;
}
function dirAlign(b1,b2){ return Math.cos(((b1-b2+540)%360-180)*Math.PI/180); }

/* ══════════════════════════════════════════════
   ROUTE GENERATOR
   ══════════════════════════════════════════════ */
function calcMins(dist, mode) {
  const board = {walk:0,local_bus:5,local_train:8,express_train:12,
    shinkansen:18,highway_bus:10,night_bus:20,ferry:60,domestic_flight:90};
  return Math.max(3, Math.round(dist / MODE_CONFIG[mode].spd * 60 + (board[mode]||0)));
}
function mapsUrl(from, to, mode) {
  const tmode = mode === 'walk' ? 'walking' : mode === 'domestic_flight' ? 'flying' : 'transit';
  return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(from.name)}&destination=${encodeURIComponent(to.name)}&travelmode=${tmode === 'flying' ? 'transit' : tmode}`;
}
function canConnect(fromM, toM, mode) {
  const cfg = MODE_CONFIG[mode];
  return cfg.rf.every(c => (fromM||'').includes(c)) && cfg.rt.every(c => (toM||'').includes(c));
}

function scoreCandidate(from, to, dist, mode, strategy, dest) {
  const totalDist = distKm(from, dest);
  const destBrg   = bearing(from, dest);
  const candBrg   = bearing(from, to);
  const dir   = dirAlign(destBrg, candBrg);
  const prog  = totalDist > 0 ? (totalDist - distKm(to, dest)) / totalDist : 0;
  const noise = Math.random() * 15;
  switch (strategy) {
    case 'detour':  return dir < -0.8 ? -Infinity : (1-dir)*55 + dist*0.3 + noise;
    case 'slow':    return -dist*0.3 + (1-dir)*12 + noise;
    case 'normal':  return dir*38 + Math.min(dist,200)*0.1 + noise;
    case 'fast':    return dir*52 + dist*0.2 + noise;
    case 'fastest': return prog*85 + dir*15 + noise*0.5;
    case 'direct':  return prog*95 + dir*10 + noise*0.3;
    default:        return dir*40 + noise;
  }
}

async function getCandidates(from, dest, dieValue) {
  const def     = DICE_DEF[dieValue];
  const modes   = def.modes;
  const results = [];

  // ── 1. Heartrails 実在駅 ──────────────────────────────
  const hrStations = await fetchNearby(from.lat, from.lng, 250);
  for (const st of hrStations) {
    if (distKm(from, st) < 0.3) continue; // 同じ場所を除外
    for (const mode of modes) {
      if (!['walk','local_bus','local_train','express_train','shinkansen','highway_bus'].includes(mode)) continue;
      const cfg = MODE_CONFIG[mode];
      const d   = distKm(from, st);
      if (d > cfg.range) continue;
      if (!canConnect(from.m||'EL', st.m, mode)) continue;
      const score = scoreCandidate(from, st, d, mode, def.strategy, dest);
      if (!isFinite(score) || score <= -Infinity) continue;
      results.push({to:st, mode, dist:d, mins:calcMins(d,mode), score, src:'heartrails'});
    }
  }

  // ── 2. フェリー静的データ ────────────────────────────
  if (modes.includes('ferry')) {
    for (const [fn,fla,fln,tn,tla,tln,h,co] of FERRY_ROUTES) {
      const ferryFrom = {name:fn, lat:fla, lng:fln, m:'F'};
      const ferryTo   = {id:'ferry_'+tn, name:tn, lat:tla, lng:tln, m:'F', src:'static'};
      const dFrom = distKm(from, ferryFrom);
      if (dFrom > 40) continue; // 乗り場まで40km以内
      const score = scoreCandidate(from, ferryTo, distKm(from, ferryTo), 'ferry', def.strategy, dest);
      if (!isFinite(score) || score <= -Infinity) continue;
      results.push({to:ferryTo, mode:'ferry', dist:distKm(from,ferryTo),
        mins:h*60, score, src:'static', note:`${co} / ${fn}発`});
    }
  }

  // ── 3. 夜行バス静的データ ────────────────────────────
  if (modes.includes('night_bus')) {
    for (const [fn,fla,fln,tn,tla,tln,mins,co] of NIGHT_BUS_ROUTES) {
      const nbFrom = {name:fn, lat:fla, lng:fln};
      const nbTo   = {id:'nb_'+tn, name:tn, lat:tla, lng:tln, m:'BL', src:'static'};
      const dFrom  = distKm(from, nbFrom);
      if (dFrom > 30) continue;
      const score = scoreCandidate(from, nbTo, distKm(from, nbTo), 'night_bus', def.strategy, dest);
      if (!isFinite(score) || score <= -Infinity) continue;
      results.push({to:nbTo, mode:'night_bus', dist:distKm(from,nbTo),
        mins, score, src:'static', note:`${co} / ${fn}発`});
    }
  }

  // 同一目的地は最良scoreだけ残す → 上位8件
  const best = new Map();
  for (const c of results) {
    const key = c.to.name;
    if (!best.has(key) || c.score > best.get(key).score) best.set(key, c);
  }
  return [...best.values()]
    .sort((a,b) => b.score - a.score)
    .slice(0, 8)
    .map((c,i) => ({...c, index:i, googleMapsUrl:mapsUrl(from, c.to, c.mode)}));
}

/* ══════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════ */
let S = null;
const SK = 'saikoro_v4';
function save() { try { S ? localStorage.setItem(SK, JSON.stringify(S)) : localStorage.removeItem(SK); } catch {} }
function load() {
  try {
    const r = localStorage.getItem(SK);
    if (r) S = JSON.parse(r);
  } catch { S = null; }
}

/* ══════════════════════════════════════════════
   GAME LOGIC
   ══════════════════════════════════════════════ */
async function startGame() {
  const on = document.getElementById('orig').value.trim();
  const dn = document.getElementById('dest').value.trim();
  if (!on || !dn) { toast('出発地と目的地を入力してください'); return; }
  toast('🔍 場所を検索中…');
  const [origin, dest] = await Promise.all([geocode(on), geocode(dn)]);
  if (!origin) { toast(`「${on}」が見つかりません`); return; }
  if (!dest)   { toast(`「${dn}」が見つかりません`); return; }
  S = {id:'s'+Date.now().toString(36), status:'waiting_dice',
    origin, destination:dest, currentLocation:{...origin},
    startedAt:new Date().toISOString(), legs:[]};
  save(); render(); toast('🎲 ゲーム開始！');
}

async function rollDice(v) {
  if (!S || S.status !== 'waiting_dice') return;
  S.status = 'loading'; render();
  try {
    const cands = await getCandidates(S.currentLocation, S.destination, v);
    S.legs.push({legNumber:S.legs.length+1, diceRoll:v, def:DICE_DEF[v],
      candidates:cands, selected:null, status:'selecting', startedAt:new Date().toISOString()});
    S.status = 'showing_candidates';
  } catch(e) {
    console.error(e); toast('エラー: '+e.message);
    S.status = 'waiting_dice';
  }
  save(); render(); document.getElementById('scr').scrollTop = 0;
}

function backToDice() {
  if (!S) return;
  if (S.legs.at(-1)?.status === 'selecting') S.legs.pop();
  S.status = 'waiting_dice'; save(); render();
}

function selectRoute(i) {
  if (!S || S.status !== 'showing_candidates') return;
  const leg = S.legs.at(-1);
  leg.selected = leg.candidates[i];
  leg.status = 'traveling';
  S.status = 'traveling';
  save(); render(); document.getElementById('scr').scrollTop = 0;
}

function arrive() {
  if (!S || S.status !== 'traveling') return;
  const leg = S.legs.at(-1);
  leg.status = 'completed'; leg.completedAt = new Date().toISOString();
  S.currentLocation = {...leg.selected.to};
  const near = distKm(S.currentLocation, S.destination) < 3;
  S.status = near ? 'completed' : 'waiting_dice';
  save(); render(); document.getElementById('scr').scrollTop = 0;
}

function endGame()   { if (!confirm('ゲームを終了しますか？')) return; S=null; save(); render(); }
function resetGame() { S=null; save(); render(); }

/* ══════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════ */
const ALL_STS = ['setup','dice','cands','travel','done'];
function showSt(id) {
  ALL_STS.forEach(s => {const e=document.getElementById('st-'+s);if(e)e.style.display='none';});
  document.getElementById('st-'+id).style.display = 'block';
}

function render() {
  if (!S) { showSt('setup'); return; }

  if (S.status === 'loading') {
    showSt('dice'); renderPc();
    document.getElementById('dgrid').innerHTML =
      `<div style="grid-column:1/-1" class="loading"><div class="sp"></div><span>Heartrailsから駅データ取得中…</span></div>`;
    return;
  }
  if (S.status === 'waiting_dice')       { showSt('dice');   renderPc(); renderDiceGrid(); return; }
  if (S.status === 'showing_candidates') { showSt('cands');  renderCands(); return; }
  if (S.status === 'traveling')          { showSt('travel'); renderTravel(); return; }
  if (S.status === 'completed') {
    showSt('done');
    const done = S.legs.filter(l=>l.status==='completed');
    const mins = done.reduce((s,l)=>s+(l.selected?.mins||0),0);
    document.getElementById('donetxt').textContent =
      `${S.origin.name}から${S.destination.name}まで\n${done.length}レグ・推定${Math.round(mins/60)}時間の旅でした！`;
  }
}

function renderPc() {
  const d    = Math.round(distKm(S.currentLocation, S.destination));
  const done = S.legs.filter(l=>l.status==='completed').length;
  document.getElementById('pc').innerHTML =
    `<div class="pc-route">${S.origin.name} → ${S.destination.name}</div>
     <div class="pc-cur">📍 現在地: ${S.currentLocation.name}</div>
     <div class="pc-sub">残り約 ${d} km ／ ${done} レグ完了</div>`;
}

function renderDiceGrid() {
  document.getElementById('dgrid').innerHTML =
    Object.entries(DICE_DEF).map(([v,d])=>
      `<button class="db d${v}" onclick="rollDice(${v})" title="${d.label}: ${d.desc}">${v}</button>`
    ).join('');
}

function renderCands() {
  const leg = S.legs.at(-1);
  const def = leg.def;
  const bn  = document.getElementById('cban');
  bn.className = `cbanner c${leg.diceRoll}`;
  bn.innerHTML = `<div class="cb-ic">${def.icon}</div><div class="cb-lbl">🎲 ${leg.diceRoll} — ${def.label}</div><div class="cb-desc">${def.desc}</div>`;

  const cl = document.getElementById('clist');
  if (!leg.candidates.length) {
    cl.innerHTML = `<div class="em"><p>この出目では候補が見つかりませんでした</p><p style="font-size:12px;margin-top:6px">← に戻って別の出目を選んでください</p></div>`;
    return;
  }
  cl.innerHTML = leg.candidates.map((c,i) => {
    const mc  = MODE_CONFIG[c.mode];
    const src = c.src==='heartrails'
      ? `<span class="src-badge src-hr">Heartrails</span>`
      : `<span class="src-badge src-st">静的データ</span>`;
    const note = c.note ? `<div class="rdata">${c.note}</div>` : '';
    return `<div class="rc">
      <div class="rh">
        <div class="rdest">${mc.icon} ${c.to.name}</div>
        <div class="rtime">約${c.mins}分</div>
      </div>
      <div class="rinfo">${src}${mc.label} ／ ${Math.round(c.dist*10)/10} km</div>
      ${note}
      <div class="ra">
        <a href="${c.googleMapsUrl}" target="_blank" rel="noopener" class="bmap">🗺 マップ</a>
        <button class="bgo" onclick="selectRoute(${i})">これで行く！</button>
      </div>
    </div>`;
  }).join('');
}

function renderTravel() {
  const leg = S.legs.at(-1);
  const r   = leg.selected;
  const mc  = MODE_CONFIG[r.mode];
  document.getElementById('confwrap').innerHTML =
    `<div class="conf">
       <div style="font-size:13px;font-weight:700;margin-bottom:5px">✅ レグ ${leg.legNumber} 確定</div>
       <div style="font-size:15px;margin-bottom:3px">${S.currentLocation.name} → ${r.to.name}</div>
       <div style="font-size:12px;color:var(--dim);margin-bottom:${r.note?'4':'10'}px">${mc.icon} ${mc.label} ／ ${Math.round(r.dist*10)/10} km ／ 約${r.mins}分</div>
       ${r.note ? `<div style="font-size:11px;color:var(--dim);margin-bottom:10px">${r.note}</div>` : ''}
       <a href="${r.googleMapsUrl}" target="_blank" rel="noopener" style="display:block;text-align:center;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:13px;text-decoration:none">🗺 Googleマップで開く →</a>
     </div>`;
  const done = S.legs.filter(l=>l.status==='completed');
  document.getElementById('thist').innerHTML = done.length
    ? [...done].reverse().map(l => {
        const r2=l.selected; const mc2=MODE_CONFIG[r2.mode];
        return `<div class="li">
          <div class="lih"><span class="lin">レグ ${l.legNumber}</span><span style="font-size:13px">${l.def.icon} 🎲${l.diceRoll}</span></div>
          <div style="font-size:13px">${mc2.icon} → ${r2.to.name}（${mc2.label}・${Math.round(r2.dist*10)/10}km・約${r2.mins}分）</div>
        </div>`;}).join('')
    : `<p style="font-size:13px;color:var(--dim)">まだ完了レグはありません</p>`;
}

/* ══════════════════════════════════════════════
   LOG TAB
   ══════════════════════════════════════════════ */
function renderLog() {
  const el = document.getElementById('logc');
  if (!S || !S.legs.length) {
    el.innerHTML = `<div class="em"><p>旅がまだ始まっていません</p></div>`; return;
  }
  el.innerHTML = `<p style="font-size:12px;color:var(--dim);margin-bottom:12px">${S.origin.name} → ${S.destination.name}</p>` +
    [...S.legs].reverse().map(l => {
      const r  = l.selected;
      const mc = r ? MODE_CONFIG[r.mode] : null;
      return `<div class="li">
        <div class="lih"><span class="lin">レグ ${l.legNumber}</span><span style="font-size:13px;font-weight:700">${l.def.icon} 🎲${l.diceRoll} ${l.def.label}</span></div>
        <div style="font-size:13px">${mc ? `${mc.icon} → ${r.to.name}（${mc.label}・${Math.round(r.dist*10)/10}km・約${r.mins}分）` : '選択中…'}</div>
      </div>`;
    }).join('');
}

/* ══════════════════════════════════════════════
   SHARE
   ══════════════════════════════════════════════ */
function doShare() {
  if (!S) { toast('ゲームが開始されていません'); return; }
  const d = {v:4, on:S.origin.name, dn:S.destination.name,
    cn:S.currentLocation.name, cl:{lat:S.currentLocation.lat,lng:S.currentLocation.lng},
    legs:S.legs.slice(-5).map(l=>({n:l.legNumber,r:l.diceRoll,
      s:l.selected?{tn:l.selected.to.name,mode:l.selected.mode,dist:Math.round(l.selected.dist*10)/10,mins:l.selected.mins}:null,
      st:l.status}))};
  const url = location.href.split('?')[0]+'?s='+btoa(unescape(encodeURIComponent(JSON.stringify(d))));
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(url).then(()=>toast('📋 URLをコピーしました')).catch(()=>showShareFb(url));
  } else showShareFb(url);
}
function showShareFb(url) {
  document.getElementById('shareout').innerHTML = `<div class="card"><div class="lbl">共有URL</div><p style="font-size:11px;word-break:break-all;line-height:1.7;color:var(--dim)">${url}</p></div>`;
}

/* TAB NAV */
function swTab(t) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.querySelector(`[data-t="${t}"]`).classList.add('on');
  document.getElementById('pn-'+t).classList.add('on');
  if (t==='log') renderLog();
}

/* TOAST */
let _tt;
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800);
}

/* API status check */
async function checkApi() {
  const el = document.getElementById('apistatus');
  try {
    const r = await Promise.race([
      fetch('https://express.heartrails.com/api/json?method=getStations&name=浜松'),
      new Promise((_,rej)=>setTimeout(()=>rej(),5000))
    ]);
    if (r.ok) { el.textContent='Heartrails ✅'; el.style.color='var(--gr)'; }
    else throw new Error();
  } catch { el.textContent='API ⚠️'; el.style.color='var(--re)'; }
}

/* INIT */
load(); render(); checkApi();
</script>
