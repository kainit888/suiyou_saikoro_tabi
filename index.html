<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e1a">
<title>🎲 サイコロ旅</title>
<style>
:root{
  --bg:#0f0e1a;--s1:#181727;--s2:#201f32;--bd:#2c2b44;
  --tx:#e2ddf0;--dim:#7a768f;--am:#e0a020;--re:#d94040;--gr:#2eb870;
  --r:12px;--font:'Hiragino Sans','Noto Sans JP',sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:15px}
button,input{font-family:var(--font)}
#app{display:flex;flex-direction:column;height:100dvh}
#hdr{flex-shrink:0;padding:calc(10px + var(--sat)) 14px 10px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
#tabs{flex-shrink:0;display:flex;background:var(--bg);border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:10px 4px;background:none;border:none;color:var(--dim);font-size:13px;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s}
.tab.on{color:var(--am);border-bottom-color:var(--am)}
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pn{display:none;padding:13px 12px calc(32px + var(--sab))}
.pn.on{display:block}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:12px}
.g{margin-bottom:11px}
.g label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.row{display:flex;gap:7px;align-items:center}
input[type=text]{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
input:focus{border-color:var(--am)}
.ibtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:15px;flex-shrink:0;cursor:pointer}
.btn{display:block;width:100%;padding:12px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;margin-bottom:8px;cursor:pointer;text-align:center;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--am);color:#0f0e1a}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-ok{background:var(--gr);color:#0f0e1a}
.pc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.crow{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:11px 12px;margin-bottom:9px}
.cbadge{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.d1{background:rgba(217,64,64,.28);color:#ff8080}
.d2{background:rgba(220,100,20,.28);color:#ffaa60}
.d3{background:rgba(200,160,0,.28);color:#ffcc40}
.d4{background:rgba(80,200,80,.28);color:#80ee80}
.d5{background:rgba(64,128,224,.28);color:#80b4ff}
.d6{background:rgba(148,60,240,.28);color:#cc90ff}
.cbody{flex:1;min-width:0}
.cdest{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:12px;color:var(--dim);line-height:1.8}
.cmeta b{color:var(--tx);font-weight:500}
.cnote{font-size:11px;color:var(--dim);opacity:.75;margin-top:1px}
.cgo{flex-shrink:0;background:var(--am);color:#0f0e1a;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s}
.cgo:active{transform:scale(.93)}
.conf{border-left:3px solid var(--am);background:var(--s1);border-radius:0 var(--r) var(--r) 0;border-right:1px solid var(--bd);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:13px;margin-bottom:12px}
.li{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.lih{display:flex;justify-content:space-between;margin-bottom:2px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 16px;gap:14px;color:var(--dim);font-size:14px}
.sp{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--am);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.done{text-align:center;padding:40px 14px}
.done .big{font-size:52px;margin-bottom:12px}
#toast{position:fixed;bottom:calc(64px + var(--sab));left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);color:var(--tx);padding:9px 20px;border-radius:20px;font-size:13px;border:1px solid var(--bd);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hint{font-size:12px;color:var(--dim);line-height:1.6;margin-bottom:12px}
.hint b{color:var(--am)}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">
  <div id="hdr">
    <span style="font-size:18px;font-weight:700">🎲 サイコロ旅</span>
    <span id="apistatus" style="font-size:11px;color:var(--dim)">…</span>
  </div>
  <div id="tabs">
    <button class="tab on" data-t="game" onclick="swTab('game')">📍 ゲーム</button>
    <button class="tab" data-t="log"  onclick="swTab('log')">📜 ログ</button>
    <button class="tab" data-t="share" onclick="swTab('share')">📤 共有</button>
  </div>
  <div id="scr">
    <div id="pn-game" class="pn on">

      <div id="st-setup">
        <div class="card">
          <p class="hint">⚠️ 出発地・目的地は <b>駅名を正確に</b> 入力してください。<br>例: <b>浜松駅</b> → <b>札幌駅</b></p>
          <div class="g">
            <label>出発地（駅名）</label>
            <div class="row">
              <input type="text" id="orig" placeholder="例: 浜松駅" oninput="onInput('orig')">
              <button class="ibtn" onclick="doGPS()">📍</button>
            </div>
            <div id="orig-ok" style="font-size:11px;margin-top:4px;min-height:16px"></div>
          </div>
          <div class="g" style="margin-bottom:0">
            <label>目的地（駅名）</label>
            <input type="text" id="dest" placeholder="例: 札幌駅" oninput="onInput('dest')">
            <div id="dest-ok" style="font-size:11px;margin-top:4px;min-height:16px"></div>
          </div>
        </div>
        <button class="btn btn-p" onclick="startGame()">🎲 ゲーム開始！</button>
      </div>

      <div id="st-dice" style="display:none">
        <div id="pc" class="pc"></div>
        <div id="time-info" style="font-size:11px;color:var(--dim);margin-bottom:8px;text-align:right"></div>
        <details id="debug-wrap" open style="margin-bottom:10px">
          <summary style="font-size:11px;color:var(--dim);cursor:pointer;user-select:none">🔍 デバッグログ（タップで展開）</summary>
          <div id="debug-log" style="font-size:10px;color:var(--dim);background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px;margin-top:6px;max-height:220px;overflow-y:auto;font-family:monospace;line-height:1.7;white-space:pre-wrap;word-break:break-all"></div>
        </details>
        <div id="clist"></div>
        <button class="btn btn-s" style="margin-top:4px" onclick="endGame()">🏁 終了</button>
      </div>

      <div id="st-travel" style="display:none">
        <div id="confwrap"></div>
        <button class="btn btn-ok" onclick="arrive()">📍 到着！次のダイスへ</button>
        <div style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px">これまでの旅路</div>
        <div id="thist"></div>
      </div>

      <div id="st-done" style="display:none">
        <div class="done">
          <div class="big">🎉</div>
          <h2 style="margin-bottom:8px">ゴール！</h2>
          <p id="donetxt" style="font-size:14px;color:var(--dim);line-height:1.6;margin-bottom:22px"></p>
          <button class="btn btn-p" onclick="resetGame()">🎲 新しい旅へ</button>
        </div>
      </div>

    </div>
    <div id="pn-log" class="pn"><div id="logc"></div></div>
    <div id="pn-share" class="pn">
      <div class="card">
        <h3 style="margin-bottom:10px">この旅を共有</h3>
        <p style="font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:14px">旅の状態をURLにエンコードします。</p>
        <button class="btn btn-p" onclick="doShare()">🔗 共有URLをコピー</button>
      </div>
      <div id="shareout"></div>
    </div>
  </div>
</div>

/* ══════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════
   MODES  新幹線・飛行機・徒歩は対象外
   ══════════════════════════════════════════════════════ */
const MODES = {
  local_bus:    {spd:22, maxKm:60,  label:'路線バス',    icon:'🚌', fare:d=>Math.round((200+d*14)/10)*10},
  local_train:  {spd:42, maxKm:200, label:'在来線(鈍行)',icon:'🚃', fare:d=>Math.round((150+d*16.2)/10)*10},
  express_train:{spd:90, maxKm:500, label:'特急',        icon:'🚃', fare:d=>Math.round((150+d*16.2+1800)/100)*100},
  highway_bus:  {spd:65, maxKm:750, label:'高速バス',    icon:'🚌', fare:d=>Math.round((600+d*4)/100)*100},
  rental_car:   {spd:65, maxKm:600, label:'レンタカー',  icon:'🚗', fare:d=>Math.round((5000+d*20)/500)*500},
  night_bus:    {spd:55, maxKm:900, label:'夜行バス',    icon:'🌙', fare:d=>Math.round((3000+d*3)/500)*500},
  ferry:        {spd:25, maxKm:9999,label:'フェリー',    icon:'⛴',  fare:d=>Math.round((3000+d*8)/500)*500},
};
const BOARD = {local_bus:5,local_train:8,express_train:15,highway_bus:15,rental_car:20,night_bus:30,ferry:60};
function calcMins(d,m){return Math.max(3,Math.round(d/MODES[m].spd*60+(BOARD[m]||0)));}
function fmtMins(m){return m<60?m+'分':Math.floor(m/60)+'時間'+(m%60?(m%60)+'分':'');}
function fmtFare(y){return y===0?'無料':'約'+y.toLocaleString()+'円';}

/* 時間帯判定: 夜行バスは20:00〜翌6:00のみ */
function isNightTime(){const h=new Date().getHours();return h>=20||h<6;}

/* ══════════════════════════════════════════════════════
   DEBUG LOGGER
   ══════════════════════════════════════════════════════ */
const _logs = [];
function dbg(msg){
  const t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const line = `[${t}] ${msg}`;
  _logs.push(line);
  console.log(line);
  const el = document.getElementById('debug-log');
  if(el){ el.textContent = _logs.slice(-60).join('\n'); el.scrollTop = el.scrollHeight; }
}
function dbgClear(){ _logs.length=0; const el=document.getElementById('debug-log'); if(el) el.textContent=''; }

/* ══════════════════════════════════════════════════════
   GEO
   ══════════════════════════════════════════════════════ */
function distKm(a,b){
  const R=6371,φ1=a.lat*Math.PI/180,φ2=b.lat*Math.PI/180,
    dφ=(b.lat-a.lat)*Math.PI/180,dλ=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
// progress: 目的地への近づき度
// +1.0 = 完全に目的地方向へ最大距離移動
//  0.0 = 横移動（目的地距離変わらず）
// -1.0 = 完全に真逆方向へ最大距離移動
function progress(from, to, dest){
  const total = distKm(from, dest);
  if(total < 0.1) return 0;
  return (distKm(from, dest) - distKm(to, dest)) / total;
}

/* ══════════════════════════════════════════════════════
   HEARTRAILS
   ──────────────────────────────────────────────────────
   Heartrailsは「指定座標から近い順に最大N件」を返す仕様のため、
   1回のクエリだと近距離駅しか得られない。
   出発地・中間点・目的地付近の3箇所を並行取得して
   全距離帯の駅をカバーする。
   ══════════════════════════════════════════════════════ */
const _cache = new Map();

async function fetchNearby(lat, lng, km=150){
  const k=`${lat.toFixed(2)},${lng.toFixed(2)}_${km}`;
  if(_cache.has(k)) return _cache.get(k);
  try{
    const url=`https://express.heartrails.com/api/json?method=getStations&x=${lng}&y=${lat}&distance=${km}`;
    const r=await Promise.race([fetch(url),new Promise((_,j)=>setTimeout(()=>j(new Error('timeout')),12000))]);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    const list=(d?.response?.station||[]).map(s=>({
      name:s.name+'駅',lat:parseFloat(s.y),lng:parseFloat(s.x),
      line:s.line,
    }));
    _cache.set(k,list);
    dbg(`fetchNearby(${lat.toFixed(2)},${lng.toFixed(2)},${km}km) → ${list.length}駅`);
    return list;
  }catch(e){dbg(`fetchNearby ERROR: ${e.message}`);return [];}
}

// 4方向のアンカーポイントから並行取得して重複除去したリストを返す
//
// 問題: 目的地方向の中間点だけを叩くと「逆方向」の駅が全く取れない
//       → prog < 0 の候補がゼロになり 🎲1〜3 が埋まらない
//
// 解決: 4方向を叩く
//   ① 出発地付近 (半径120km) — 近距離・全方向
//   ② 目的地方向 1/3地点 (半径150km) — 前進候補
//   ③ 目的地方向 2/3地点 (半径150km) — 遠距離前進候補
//   ④ 目的地の逆方向 250km地点 (半径150km) — 逆走候補 (prog < 0)
async function fetchAll(from, dest){
  // 目的地方向の単位ベクトル
  const dLat = dest.lat - from.lat;
  const dLng = dest.lng - from.lng;
  const norm = Math.sqrt(dLat*dLat + dLng*dLng);
  const uLat = dLat/norm, uLng = dLng/norm;

  // 逆方向 250km (度換算: 1度≒111km)
  const backDist = 2.25; // 250km ÷ 111km/deg
  const back = {
    lat: from.lat - uLat * backDist,
    lng: from.lng - uLng * backDist,
  };
  const fwd1 = {
    lat: from.lat + (dest.lat-from.lat)*0.33,
    lng: from.lng + (dest.lng-from.lng)*0.33,
  };
  const fwd2 = {
    lat: from.lat + (dest.lat-from.lat)*0.67,
    lng: from.lng + (dest.lng-from.lng)*0.67,
  };

  dbg(`fetchAll 4方向クエリ開始...`);
  dbg(`  ① 出発地付近 (${from.lat.toFixed(2)},${from.lng.toFixed(2)}) r=120km`);
  dbg(`  ② 前進1/3  (${fwd1.lat.toFixed(2)},${fwd1.lng.toFixed(2)}) r=150km`);
  dbg(`  ③ 前進2/3  (${fwd2.lat.toFixed(2)},${fwd2.lng.toFixed(2)}) r=150km`);
  dbg(`  ④ 逆方向   (${back.lat.toFixed(2)},${back.lng.toFixed(2)}) r=150km`);

  const [s1,s2,s3,s4] = await Promise.all([
    fetchNearby(from.lat, from.lng, 120),
    fetchNearby(fwd1.lat, fwd1.lng, 150),
    fetchNearby(fwd2.lat, fwd2.lng, 150),
    fetchNearby(back.lat, back.lng, 150),
  ]);

  const seen = new Set();
  const all = [];
  for(const st of [...s1,...s2,...s3,...s4]){
    if(!seen.has(st.name)){ seen.add(st.name); all.push(st); }
  }
  dbg(`fetchAll: near=${s1.length} fwd1=${s2.length} fwd2=${s3.length} back=${s4.length} → 合計${all.length}駅`);
  return all;
}

// 出発地からの距離に応じて使える手段を返す
function getModesForDist(d){
  const m=[];
  if(d <= 60)  m.push('local_bus');
  if(d <= 300) m.push('local_train');
  if(d <= 700) m.push('express_train');
  if(d <= 750) m.push('highway_bus');
  if(d <= 600) m.push('rental_car');
  if(m.length===0) m.push('express_train'); // フォールバック
  return m;
}

async function geocode(text){
  const q=text.replace(/駅$/,'').trim();
  try{
    const url=`https://express.heartrails.com/api/json?method=getStations&name=${encodeURIComponent(q)}`;
    const r=await Promise.race([fetch(url),new Promise((_,j)=>setTimeout(()=>j(),8000))]);
    if(r.ok){
      const d=await r.json();
      const st=d?.response?.station;
      if(st?.length) return {name:st[0].name+'駅',lat:parseFloat(st[0].y),lng:parseFloat(st[0].x)};
    }
  }catch(e){console.warn('[geocode]',e.message);}
  for(const [k,v] of Object.entries(GEO_FB)){
    if(text.includes(k)||k.includes(q)) return {name:text,lat:v.lat,lng:v.lng};
  }
  return null;
}

/* ══════════════════════════════════════════════════════
   MASTER POOL BUILDER
   ══════════════════════════════════════════════════════ */
async function buildPool(from, dest){
  const night = isNightTime();

  // 3地点から全駅取得（出発地・中間・目的地付近）
  const stations = await fetchAll(from, dest);
  const pool = [];

  for(const st of stations){
    const d = distKm(from, st);
    if(d < 0.5) continue;
    const prog = progress(from, st, dest);
    for(const mode of getModesForDist(d)){
      pool.push({
        to:{name:st.name,lat:st.lat,lng:st.lng},
        mode, dist:d, prog,
        mins:calcMins(d,mode),
        fare:MODES[mode].fare(d),
        note:null,
      });
    }
  }

  // フェリー（常時）
  for(const [fn,fla,fln,tn,tla,tln,mins,co] of FERRY){
    if(distKm(from,{lat:fla,lng:fln}) > 50) continue;
    const to={name:tn,lat:tla,lng:tln};
    const d=distKm(from,to);
    pool.push({to,mode:'ferry',dist:d,prog:progress(from,to,dest),
      mins,fare:MODES.ferry.fare(d),note:`${co}（${fn}発）`});
  }

  // 夜行バス（夜間のみ）
  if(night){
    for(const [fn,fla,fln,tn,tla,tln,mins,co] of NIGHTBUS){
      if(distKm(from,{lat:fla,lng:fln}) > 40) continue;
      const to={name:tn,lat:tla,lng:tln};
      const d=distKm(from,to);
      pool.push({to,mode:'night_bus',dist:d,prog:progress(from,to,dest),
        mins,fare:MODES.night_bus.fare(d),note:`${co}（${fn}発・夜間）`});
    }
  }

  // progの分布をログ出力
  const progBuckets = {very_neg:0, neg:0, near_zero:0, small_pos:0, mid_pos:0, high_pos:0};
  for(const e of pool){
    if(e.prog < -0.1) progBuckets.very_neg++;
    else if(e.prog < 0) progBuckets.neg++;
    else if(e.prog < 0.1) progBuckets.near_zero++;
    else if(e.prog < 0.3) progBuckets.small_pos++;
    else if(e.prog < 0.6) progBuckets.mid_pos++;
    else progBuckets.high_pos++;
  }
  const modeCount = {};
  for(const e of pool) modeCount[e.mode]=(modeCount[e.mode]||0)+1;
  dbg(`pool: ${stations.length}駅 → ${pool.length}エントリ (夜間=${night})`);
  dbg(`prog分布: <-10%:${progBuckets.very_neg} -10~0%:${progBuckets.neg} 0~10%:${progBuckets.near_zero} 10~30%:${progBuckets.small_pos} 30~60%:${progBuckets.mid_pos} 60%+:${progBuckets.high_pos}`);
  dbg(`手段: ${Object.entries(modeCount).map(([k,v])=>k+'='+v).join(' ')}`);
  return pool;
}

/* ══════════════════════════════════════════════════════
   DICE ASSIGNMENT

   progres（目的地への近づき度）ベースで6択を決める:

   🎲1 真逆       prog < -0.05  → prog最小（最も遠ざかる）を確定
   🎲2 横〜逆A   prog < 0.15   → ランダム
   🎲3 横〜逆B   prog < 0.15   → ランダム（2と行き先が被らない）
   🎲4 少し前進   0.05〜0.45   → prog小さめのものをランダム
   🎲5 前進       0.2〜0.8     → prog大きめのものをランダム
   🎲6 最適前進   prog > 0.3   → prog最大 + 速い手段優先

   各帯に候補が足りない場合は帯を段階的に広げてフォールバック。
   全6件の行き先（to.name）は重複しない。
   ══════════════════════════════════════════════════════ */

// 速い手段ランク（🎲6で使用）
const SPD = {express_train:6,highway_bus:5,rental_car:5,night_bus:4,ferry:3,local_train:2,local_bus:1};

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// 出目ごとの選出ルール
// each rule: {bands:[[minProg,maxProg],...], sort:'min'|'max_prog'|'random'|'fast'}
const DICE_RULES = {
  1:{bands:[[-1.0,-0.05],[-1.0, 0.0], [-1.0, 0.1], [-1.0, 1.0]], sort:'min'},
  2:{bands:[[-1.0, 0.15],[-1.0, 0.25],[-1.0, 0.4], [-1.0, 1.0]], sort:'random'},
  3:{bands:[[-1.0, 0.15],[-1.0, 0.25],[-1.0, 0.4], [-1.0, 1.0]], sort:'random'},
  4:{bands:[[ 0.05, 0.45],[0.0, 0.55], [-0.1, 0.65],[-1.0, 1.0]], sort:'random'},
  5:{bands:[[ 0.2,  0.8], [0.1, 0.9], [ 0.0, 1.0], [-1.0, 1.0]], sort:'random'},
  6:{bands:[[ 0.3,  1.0], [0.15,1.0], [ 0.0, 1.0], [-1.0, 1.0]], sort:'fast'},
};

function assignDice(pool){
  const used = new Set();
  const result = [];

  for(let die=1; die<=6; die++){
    const rule = DICE_RULES[die];
    let picked = null;
    let usedBandIdx = -1;

    for(let bi=0; bi<rule.bands.length; bi++){
      const [minP, maxP] = rule.bands[bi];
      let cands = pool.filter(c => c.prog >= minP && c.prog <= maxP && !used.has(c.to.name));
      dbg(`🎲${die} band[${bi}](${minP}~${maxP}): ${cands.length}件`);
      if(!cands.length) continue;
      usedBandIdx = bi;

      if(rule.sort === 'min'){
        cands.sort((a,b) => a.prog - b.prog); // prog最小（最も遠ざかる）
        picked = cands[0];
      } else if(rule.sort === 'fast'){
        cands.sort((a,b) => {
          if(b.prog !== a.prog) return b.prog - a.prog; // prog高い順
          return (SPD[b.mode]||0) - (SPD[a.mode]||0);  // 同prog内は速い手段優先
        });
        picked = cands[0];
      } else {
        // random: シャッフルして先頭
        shuffle(cands);
        picked = cands[0];
      }
      break;
    }

    if(picked){
      used.add(picked.to.name);
      result.push({...picked, dieValue:die});
      dbg(`🎲${die} → ${picked.to.name} (prog=${(picked.prog*100).toFixed(1)}%, ${picked.mode}, band=${usedBandIdx})`);
    } else {
      dbg(`🎲${die} → ❌ 候補なし (used=${[...used].join(',')})`);
    }
  }

  dbg(`assignDice: ${result.length}/6件選出 → [${result.map(r=>`🎲${r.dieValue}:${r.to.name}(${(r.prog*100).toFixed(1)}%)`).join(', ')}]`);
  if(result.length < 6) dbg(`⚠️ ${6-result.length}件不足 (pool=${pool.length}件)`);
  return result;
}

let S = null;
const SK = 'saikoro_v7';
function save(){try{S?localStorage.setItem(SK,JSON.stringify(S)):localStorage.removeItem(SK);}catch{}}

   GAME LOGIC
   ══════════════════════════════════════════════════════ */
let _gcTimer={};
function onInput(field){
  const el=document.getElementById(field+'-ok');
  el.textContent='';
  const v=document.getElementById(field).value.trim();
  if(!v) return;
  clearTimeout(_gcTimer[field]);
  _gcTimer[field]=setTimeout(async()=>{
    el.textContent='検索中…';el.style.color='var(--dim)';
    const r=await geocode(v);
    if(r){el.textContent='✅ '+r.name+' ('+r.lat.toFixed(4)+', '+r.lng.toFixed(4)+')';el.style.color='var(--gr)';}
    else{el.textContent='⚠️ 見つかりません';el.style.color='var(--re)';}
  },600);
}

async function startGame(){
  const on=document.getElementById('orig').value.trim();
  const dn=document.getElementById('dest').value.trim();
  if(!on||!dn){toast('出発地と目的地を入力してください');return;}
  toast('🔍 場所を検索中…');
  const [origin,dest]=await Promise.all([geocode(on),geocode(dn)]);
  if(!origin){toast(`「${on}」が見つかりません`);return;}
  if(!dest){toast(`「${dn}」が見つかりません`);return;}
  S={id:'s'+Date.now().toString(36),status:'loading',
    origin,destination:dest,currentLocation:{...origin},
    startedAt:new Date().toISOString(),legs:[],candidates:[]};
  save();render();
  await loadCandidates();
}

async function loadCandidates(){
  if(!S) return;
  dbgClear();
  dbg(`=== loadCandidates 開始 ===`);
  dbg(`現在地: ${S.currentLocation.name} (${S.currentLocation.lat?.toFixed(4)}, ${S.currentLocation.lng?.toFixed(4)})`);
  dbg(`目的地: ${S.destination.name} (${S.destination.lat?.toFixed(4)}, ${S.destination.lng?.toFixed(4)})`);
  dbg(`総距離: ${distKm(S.currentLocation,S.destination).toFixed(1)}km`);
  S.status='loading';render();
  try{
    const pool=await buildPool(S.currentLocation,S.destination);
    S.candidates=assignDice(pool);
    S.status='waiting_dice';
  }catch(e){
    console.error('[loadCandidates]',e);
    toast('エラー: '+e.message);
    S.status='waiting_dice';S.candidates=[];
  }
  save();render();
}

function selectRoute(die){
  if(!S||S.status!=='waiting_dice') return;
  const c=S.candidates.find(x=>x.dieValue===die);
  if(!c) return;
  S.legs.push({legNumber:S.legs.length+1,diceRoll:die,selected:c,
    status:'traveling',startedAt:new Date().toISOString(),completedAt:null});
  S.status='traveling';
  save();render();document.getElementById('scr').scrollTop=0;
}

function arrive(){
  if(!S||S.status!=='traveling') return;
  const leg=S.legs.at(-1);
  leg.status='completed';leg.completedAt=new Date().toISOString();
  S.currentLocation={...leg.selected.to};
  const d=distKm(S.currentLocation,S.destination);
  const nameMatch=S.currentLocation.name===S.destination.name;
  if(nameMatch||d<1.0){S.status='completed';save();render();return;}
  toast('📍 到着！目的地まであと約'+Math.round(d)+'km');
  loadCandidates();
}

function endGame(){
  if(!confirm('ゲームを終了しますか？')) return;
  S=null;save();
  document.getElementById('orig').value='';
  document.getElementById('dest').value='';
  swTab('game');showSt('setup');
}
function resetGame(){
  S=null;save();
  document.getElementById('orig').value='';
  document.getElementById('dest').value='';
  showSt('setup');
}

   ══════════════════════════════════════════════════════ */
function showSt(id){
  ['setup','dice','travel','done'].forEach(s=>{
    const e=document.getElementById('st-'+s);if(e)e.style.display='none';
  });
  document.getElementById('st-'+id).style.display='block';
}

function render(){
  if(!S){showSt('setup');return;}
  if(S.status==='loading'){
    showSt('dice');renderPc();
    document.getElementById('clist').innerHTML=
      `<div class="loading"><div class="sp"></div><span>Heartrailsから駅データ取得中…</span></div>`;
    return;
  }
  if(S.status==='waiting_dice'){showSt('dice');renderPc();renderList();return;}
  if(S.status==='traveling'){showSt('travel');renderTravel();return;}
  if(S.status==='completed'){
    showSt('done');
    const done=S.legs.filter(l=>l.status==='completed');
    const mins=done.reduce((s,l)=>s+(l.selected?.mins||0),0);
    const fare=done.reduce((s,l)=>s+(l.selected?.fare||0),0);
    const fd=Math.round(distKm(S.currentLocation,S.destination)*10)/10;
    document.getElementById('donetxt').innerHTML=
      `<b>${S.origin.name}</b> → <b>${S.destination.name}</b><br>`+
      `${done.length}レグ・推定${fmtMins(mins)}・合計${fmtFare(fare)}<br>`+
      `<span style="font-size:12px">目的地まで残り${fd}km地点でゴール</span>`;
  }
}

function renderPc(){
  const d=Math.round(distKm(S.currentLocation,S.destination));

        dist:Math.round(l.selected.dist*10)/10,mins:l.selected.mins,fare:l.selected.fare}:null}))};
  const url=location.href.split('?')[0]+'?s='+btoa(unescape(encodeURIComponent(JSON.stringify(d))));
  if(navigator.clipboard?.writeText) navigator.clipboard.writeText(url).then(()=>toast('📋 URLをコピーしました')).catch(()=>showFb(url));
  else showFb(url);
}
function showFb(url){document.getElementById('shareout').innerHTML=`<div class="card"><p style="font-size:11px;word-break:break-all;line-height:1.7;color:var(--dim)">${url}</p></div>`;}

function swTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.querySelector(`[data-t="${t}"]`).classList.add('on');
  document.getElementById('pn-'+t).classList.add('on');
  if(t==='log') renderLog();
}

let _tt;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('show'),2800);}

async function checkApi(){
  const el=document.getElementById('apistatus');
  try{
    const r=await Promise.race([fetch('https://express.heartrails.com/api/json?method=getStations&name=浜松'),new Promise((_,j)=>setTimeout(()=>j(),5000))]);
    el.textContent=r.ok?'Heartrails ✅':'API ⚠️';
    el.style.color=r.ok?'var(--gr)':'var(--re)';
  }catch{el.textContent='API ⚠️';el.style.color='var(--re)';}
}

load();render();checkApi();
</script>
