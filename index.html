<!DOCTYPE html>
<html lang="ja">
<head>

<title>🎲 サイコロ旅</title>
<style>
:root{
  --bg:#0f0e1a;--s1:#181727;--s2:#201f32;--bd:#2c2b44;
  --tx:#e2ddf0;--dim:#7a768f;--am:#e0a020;--re:#d94040;--gr:#2eb870;
  --r:12px;--font:'Hiragino Sans','Noto Sans JP',sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:15px}
button,input{font-family:var(--font)}
#app{display:flex;flex-direction:column;height:100dvh}
#hdr{flex-shrink:0;padding:calc(10px + var(--sat)) 14px 10px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
#tabs{flex-shrink:0;display:flex;background:var(--bg);border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:10px 4px;background:none;border:none;color:var(--dim);font-size:13px;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s}
.tab.on{color:var(--am);border-bottom-color:var(--am)}
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pn{display:none;padding:13px 12px calc(32px + var(--sab))}
.pn.on{display:block}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:12px}
.g{margin-bottom:11px}
.g label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.row{display:flex;gap:7px;align-items:center}
input[type=text]{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
input:focus{border-color:var(--am)}
.ibtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:15px;flex-shrink:0;cursor:pointer}
.btn{display:block;width:100%;padding:12px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;margin-bottom:8px;cursor:pointer;text-align:center;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--am);color:#0f0e1a}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-ok{background:var(--gr);color:#0f0e1a}
.pc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.crow{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:11px 12px;margin-bottom:9px}
.cbadge{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.d1{background:rgba(217,64,64,.28);color:#ff8080}
.d2{background:rgba(220,100,20,.28);color:#ffaa60}
.d3{background:rgba(200,160,0,.28);color:#ffcc40}
.d4{background:rgba(80,200,80,.28);color:#80ee80}
.d5{background:rgba(64,128,224,.28);color:#80b4ff}
.d6{background:rgba(148,60,240,.28);color:#cc90ff}
.cbody{flex:1;min-width:0}
.cdest{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:12px;color:var(--dim);line-height:1.8}
.cmeta b{color:var(--tx);font-weight:500}
.cnote{font-size:11px;color:var(--dim);opacity:.75;margin-top:1px}
.cgo{flex-shrink:0;background:var(--am);color:#0f0e1a;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s}
.cgo:active{transform:scale(.93)}
.conf{border-left:3px solid var(--am);background:var(--s1);border-radius:0 var(--r) var(--r) 0;border-right:1px solid var(--bd);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:13px;margin-bottom:12px}

.lih{display:flex;justify-content:space-between;margin-bottom:2px}

.sp{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--am);border-radius:50%;animation:sp .7s linear infinite}

.done .big{font-size:52px;margin-bottom:12px}
#toast{position:fixed;bottom:calc(64px + var(--sab));left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);color:var(--tx);padding:9px 20px;border-radius:20px;font-size:13px;border:1px solid var(--bd);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:99}

/* ═══════════════════════════════════════════════════════
   MODES  新幹線・飛行機・徒歩は対象外

const MODES = {
  local_bus:    {spd:22, label:'路線バス',    icon:'🚌', fare:d=>Math.round((200+d*14)/10)*10},
  local_train:  {spd:42, label:'在来線(鈍行)',icon:'🚃', fare:d=>Math.round((150+d*16.2)/10)*10},

const BOARD = {local_bus:5,local_train:8,express_train:15,highway_bus:15,rental_car:20,night_bus:30,ferry:60};
function calcMins(d,m){return Math.max(3,Math.round(d/MODES[m].spd*60+(BOARD[m]||0)));}
function fmtMins(m){return m<60?m+'分':Math.floor(m/60)+'時間'+(m%60?(m%60)+'分':'');}
function fmtFare(y){return y===0?'無料':'約'+y.toLocaleString()+'円';}

/* ═══════════════════════════════════════════════════════
   DEBUG
   ═══════════════════════════════════════════════════════ */
const _logs=[];
function dbg(msg){
  const t=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const line=`[${t}] ${msg}`;
  _logs.push(line);console.log(line);
  const el=document.getElementById('debug-log');
  if(el){el.textContent=_logs.slice(-80).join('\n');el.scrollTop=el.scrollHeight;}
}
function dbgClear(){_logs.length=0;const el=document.getElementById('debug-log');if(el)el.textContent='';}

/* ═══════════════════════════════════════════════════════
   GEO
   ═══════════════════════════════════════════════════════ */
function distKm(a,b){
  const R=6371,dφ=(b.lat-a.lat)*Math.PI/180,dλ=(b.lng-a.lng)*Math.PI/180,
    φ1=a.lat*Math.PI/180,φ2=b.lat*Math.PI/180;
  const x=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
// progress: +1=目的地方向 0=横移動 -1=真逆
function prog(from,to,dest){
  const tot=distKm(from,dest);
  return tot<0.1?0:(distKm(from,dest)-distKm(to,dest))/tot;
}

/* ═══════════════════════════════════════════════════════
   HEARTRAILS  路線ベースAPI
   ─────────────────────────────────────────────────────
   水曜どうでしょう方式:
   「今いる駅が属する路線の全駅リストを取得する」
   → 東海道本線なら東京〜大阪の全駅が候補に入る
   → その中からダイス出目の条件に合う1駅を選ぶ

   エンドポイント:
   ① getStations?name=xxx   駅名 → その駅が属する路線リスト
   ② getStations?line=xxx   路線名 → 路線上の全駅リスト
   ③ getStations?x=&y=&...  座標検索（フォールバック用）
   ═══════════════════════════════════════════════════════ */
const _cache = new Map();

async function hrFetch(params) {
  if (_cache.has(params)) return _cache.get(params);
  const url = `https://express.heartrails.com/api/json?${params}`;
  try {
    const r = await Promise.race([
      fetch(url),
      new Promise((_,j) => setTimeout(() => j(new Error('timeout')), 12000))
    ]);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const list = (d?.response?.station || []).map(s => ({
      name: s.name+'駅', lat: parseFloat(s.y), lng: parseFloat(s.x), line: s.line,
    }));
    _cache.set(params, list);
    return list;
  } catch(e) { dbg('hrFetch ERR('+params.slice(0,40)+'): '+e.message); return []; }
}

// 駅名からその駅が属する路線一覧を返す（各路線ごとに1エントリ）
function fetchByName(name) {
  return hrFetch(`method=getStations&name=${encodeURIComponent(name)}`);
}
// 路線名から全駅リストを返す
function fetchByLine(line) {
  return hrFetch(`method=getStations&line=${encodeURIComponent(line)}`);
}
// 座標から近隣駅（フォールバック・GPS用）
function fetchNearby(lat, lng, km=150) {
  return hrFetch(`method=getStations&x=${lng}&y=${lat}&distance=${km}`);
}

async function geocode(text) {
  const q = text.replace(/駅$/,'').trim();
  try {
    const hits = await fetchByName(q);
    if (hits.length) return {name:hits[0].name, lat:hits[0].lat, lng:hits[0].lng};
  } catch(e) { console.warn('[geocode]',e.message); }
  for (const [k,v] of Object.entries(GEO_FB)) {
    if (text.includes(k)||k.includes(q)) return {name:text, lat:v.lat, lng:v.lng};
  }
  return null;
}

/* ═══════════════════════════════════════════════════════
   POOL BUILDER  路線ベース
   ─────────────────────────────────────────────────────
   ① 現在地の駅名で getStations?name= → 路線リストを取得
   ② 各路線の getStations?line= → 路線上の全駅を取得
   ③ 全駅 × 距離適合手段 でエントリを生成
   ④ フェリー・夜行バス（静的データ）を追加
   ═══════════════════════════════════════════════════════ */
function modesForDist(d) {
  if (d <=  40) return ['local_bus'];
  if (d <= 120) return ['local_train'];
  if (d <= 300) return ['local_train','express_train'];
  if (d <= 700) return ['express_train','highway_bus'];
  return ['express_train'];
}

async function buildPool(from, dest) {
  const night = isNight();
  const pool  = [];

  // ① 現在地の路線を取得
  const base = from.name.replace(/駅$/,'');
  const nameHits = await fetchByName(base);
  const lines = [...new Set(nameHits.map(s=>s.line).filter(Boolean))];
  dbg(`${from.name} の路線 (${lines.length}件): ${lines.join(' / ')}`);

  let allStations = [];

  if (lines.length > 0) {
    // ② 各路線の全駅を並行取得
    const results = await Promise.all(lines.map(l => fetchByLine(l)));
    const seen = new Set([from.name]);
    for (let i=0; i<lines.length; i++) {
      dbg(`  ${lines[i]}: ${results[i].length}駅`);
      for (const st of results[i]) {
        if (!seen.has(st.name)) { seen.add(st.name); allStations.push(st); }
      }
    }
    dbg(`路線上の全駅: ${allStations.length}駅`);
  }

  // 路線が取れない場合は座標フォールバック
  if (allStations.length < 10) {
    dbg(`⚠️ 路線データ不足 → 座標フォールバック (r=300km)`);
    const nearby = await fetchNearby(from.lat, from.lng, 300);
    const seen = new Set([from.name, ...allStations.map(s=>s.name)]);
    for (const st of nearby) {
      if (!seen.has(st.name)) { seen.add(st.name); allStations.push(st); }
    }
    dbg(`フォールバック後: ${allStations.length}駅`);
  }

  // ③ プール化
  for (const st of allStations) {
    const d = distKm(from, st);
    if (d < 0.3) continue;
    const p = prog(from, st, dest);
    for (const mode of modesForDist(d)) {
      pool.push({to:{name:st.name,lat:st.lat,lng:st.lng}, mode, dist:d, prog:p,
        mins:calcMins(d,mode), fare:MODES[mode].fare(d), note:null});
    }
  }

  // ④ フェリー（常時）
  for (const [fn,fla,fln,tn,tla,tln,mins,co] of FERRY) {
    if (distKm(from,{lat:fla,lng:fln}) > 60) continue;
    const to={name:tn,lat:tla,lng:tln};
    const d=distKm(from,to);
    pool.push({to,mode:'ferry',dist:d,prog:prog(from,to,dest),
      mins,fare:MODES.ferry.fare(d),note:`${co}（${fn}発）`});
  }

  // ⑤ 夜行バス（夜間のみ）
  if (night) {
    for (const [fn,fla,fln,tn,tla,tln,mins,co] of NIGHTBUS) {
      if (distKm(from,{lat:fla,lng:fln}) > 50) continue;
      const to={name:tn,lat:tla,lng:tln};
      const d=distKm(from,to);
      pool.push({to,mode:'night_bus',dist:d,prog:prog(from,to,dest),
        mins,fare:MODES.night_bus.fare(d),note:`${co}（${fn}発・夜間）`});
    }
  }

  // ── 補充: マイナス進捗の駅が少ない場合は逆方向を追加クエリ ─────────
  // 🎲1〜3が全部埋まるには最低3件のマイナス進捗エントリが必要
  const negCount = pool.filter(e => e.prog < -0.001).length;
  const negNames = new Set(pool.filter(e => e.prog < -0.001).map(e => e.to.name));
  dbg(`マイナス進捗エントリ: ${negCount}件`);

  if (negNames.size < 4) {
    dbg(`⚠️ マイナス駅不足 (${negNames.size}件) → 逆方向補充クエリ`);
    // 目的地の逆方向に 200km 離れた地点を中心にクエリ
    const dLat = dest.lat - from.lat, dLng = dest.lng - from.lng;
    const norm  = Math.sqrt(dLat*dLat + dLng*dLng);
    const step  = 1.8; // ≈200km
    const back  = { lat: from.lat - dLat/norm*step, lng: from.lng - dLng/norm*step };
    dbg(`  逆方向クエリ地点: (${back.lat.toFixed(2)},${back.lng.toFixed(2)})`);
    const backStations = await fetchNearby(back.lat, back.lng, 180);
    const seen = new Set([from.name, ...allStations.map(s=>s.name)]);
    let added = 0;
    for (const st of backStations) {
      if (seen.has(st.name)) continue;
      const d = distKm(from, st);
      if (d < 0.3) continue;
      const p = prog(from, st, dest);
      if (p >= 0) continue; // マイナスのみ追加
      seen.add(st.name);
      allStations.push(st);
      for (const mode of modesForDist(d)) {
        pool.push({to:{name:st.name,lat:st.lat,lng:st.lng}, mode, dist:d, prog:p,
          mins:calcMins(d,mode), fare:MODES[mode].fare(d), note:'(補充)'});
      }
      added++;
    }
    dbg(`  補充: ${backStations.length}駅取得 → マイナス${added}駅追加`);
  }

  // ログ
  const pb={vn:0,n:0,z:0,sp:0,mp:0,hp:0};
  for(const e of pool){
    if(e.prog<-0.1)pb.vn++;else if(e.prog<0)pb.n++;else if(e.prog<0.1)pb.z++;
    else if(e.prog<0.3)pb.sp++;else if(e.prog<0.6)pb.mp++;else pb.hp++;
  }
  const mc={};
  for(const e of pool) mc[e.mode]=(mc[e.mode]||0)+1;
  dbg(`pool: ${pool.length}エントリ`);
  dbg(`prog分布: <-10%:${pb.vn} -10~0%:${pb.n} ~10%:${pb.z} ~30%:${pb.sp} ~60%:${pb.mp} 60%+:${pb.hp}`);
  dbg(`手段: ${Object.entries(mc).map(([k,v])=>k+'='+v).join(' ')}`);
  return pool;
}

/* ═══════════════════════════════════════════════════════
   DICE ASSIGNMENT
   ─────────────────────────────────────────────────────
   prog（目的地への近づき度）ベースで6択を決める。
   全6件の行き先が被らないよう管理する。

   🎲1 真逆       prog最小（最も遠ざかる）確定
   🎲2 逆方向A   prog < +0.15  ランダム
   🎲3 逆方向B   prog < +0.15  ランダム（2と被らない）
   🎲4 少し前進   prog 0.05〜0.45  ランダム
   🎲5 前進       prog 0.2〜0.8    ランダム
   🎲6 最適前進   prog最大 + 速い手段

   各帯に候補不足の場合は段階的に帯を広げる
   ═══════════════════════════════════════════════════════ */
// bias: -3(まったり)〜0(標準)〜+3(ハード)
// 1-3はマイナス方向、4-6はプラス方向が基本
// biasが高いほど1-3はより強烈な逆走・4-6はより遠くへ
let _bias = 0;
function getBands(bias=_bias) {
  // 1-3の上限: 標準0% → biasが大きいほどマイナスへ
  const neg = bias * 0.08;       // bias=3 → -0.24（24%逆走以上が対象）
  // 4-6の下限: 標準5〜30% → biasが大きいほどプラスへ
  const pos4 = 0.05 + bias*0.05; // bias=3 → 20%前進以上
  const pos5 = 0.15 + bias*0.06; // bias=3 → 33%前進以上
  const pos6 = 0.25 + bias*0.07; // bias=3 → 46%前進以上
  return {
    // 1〜3: 全フォールバックも上限0未満で固定。常に逆走！
    // biasが上がるほど「よりひどい逆走」のみを選ぶ
    1:[[-1.0, -0.05-neg],[-1.0, -0.03],[-1.0, -0.01],[-1.0, -0.001]],
    2:[[-1.0, -0.03-neg],[-1.0, -0.02],[-1.0, -0.01],[-1.0, -0.001]],
    3:[[-1.0, -0.01-neg],[-1.0, -0.01],[-1.0, -0.001],[-1.0, 0.0]],
    4:[[pos4, 0.6],      [0.0,  0.7],  [-0.1, 0.8],  [-1.0, 1.0]],
    5:[[pos5, 0.85],     [0.05, 0.9],  [0.0,  1.0],  [-1.0, 1.0]],
    6:[[pos6, 1.0],      [0.1,  1.0],  [0.0,  1.0],  [-1.0, 1.0]],
  };
}
const SPD_RANK = {express_train:6,highway_bus:5,rental_car:5,night_bus:4,ferry:3,local_train:2,local_bus:1};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function assignDice(pool) {
  const used = new Set();
  const result = [];

  for (let die=1; die<=6; die++) {
    let picked = null;
    let usedBand = -1;

    const bands = getBands();
    for (let bi=0; bi<bands[die].length; bi++) {
      const [lo,hi] = bands[die][bi];
      let cands = pool.filter(c => c.prog>=lo && c.prog<=hi && !used.has(c.to.name));
      dbg(`🎲${die} band[${bi}](${lo}~${hi}): ${cands.length}件`);
      if (!cands.length) continue;
      usedBand = bi;

      if (die === 1) {
        cands.sort((a,b) => a.prog - b.prog); // prog最小
        picked = cands[0];
      } else if (die === 6) {
        cands.sort((a,b) => b.prog!==a.prog ? b.prog-a.prog : (SPD_RANK[b.mode]||0)-(SPD_RANK[a.mode]||0));
        picked = cands[0];
      } else {
        shuffle(cands);
        picked = cands[0];
      }
      break;
    }

    if (picked) {
      used.add(picked.to.name);
      result.push({...picked, dieValue:die});
      dbg(`🎲${die} → ${picked.to.name} (prog=${(picked.prog*100).toFixed(1)}%, ${picked.mode}, band=${usedBand})`);
    } else {
      dbg(`🎲${die} → ❌ 候補なし`);
    }
  }

  dbg(`assignDice: ${result.length}/6件`);
  return result;
}

let S = null;
const SK = 'saikoro_v8';
function save(){try{S?localStorage.setItem(SK,JSON.stringify(S)):localStorage.removeItem(SK);}catch{}}
function load(){try{const r=localStorage.getItem(SK);if(r)S=JSON.parse(r);}catch{S=null;}}

/* ═══════════════════════════════════════════════════════
   GAME LOGIC
   ═══════════════════════════════════════════════════════ */
let _gcT={};
function onInput(f){
  const el=document.getElementById(f+'-ok');el.textContent='';
  const v=document.getElementById(f).value.trim();if(!v)return;
  clearTimeout(_gcT[f]);
  _gcT[f]=setTimeout(async()=>{
    el.textContent='検索中…';el.style.color='var(--dim)';
    const r=await geocode(v);
    if(r){el.textContent='✅ '+r.name;el.style.color='var(--gr)';}
    else{el.textContent='⚠️ 見つかりません';el.style.color='var(--re)';}
  },600);
}

async function startGame(){
  const on=document.getElementById('orig').value.trim();
  const dn=document.getElementById('dest').value.trim();
  if(!on||!dn){toast('出発地と目的地を入力してください');return;}
  toast('🔍 場所を検索中…');
  const [origin,dest]=await Promise.all([geocode(on),geocode(dn)]);
  if(!origin){toast(`「${on}」が見つかりません`);return;}
  if(!dest){toast(`「${dn}」が見つかりません`);return;}
  S={id:'s'+Date.now().toString(36),status:'loading',
    origin,destination:dest,currentLocation:{...origin},
    startedAt:new Date().toISOString(),legs:[],candidates:[]};
  save();render();
  await loadCandidates();
}

async function loadCandidates(){
  if(!S)return;
  dbgClear();
  dbg(`=== loadCandidates ===`);
  dbg(`現在地: ${S.currentLocation.name} (${S.currentLocation.lat?.toFixed(4)},${S.currentLocation.lng?.toFixed(4)})`);
  dbg(`目的地: ${S.destination.name}`);
  dbg(`総距離: ${distKm(S.currentLocation,S.destination).toFixed(1)}km`);
  S.status='loading';render();
  try{
    const pool=await buildPool(S.currentLocation,S.destination);
    S.candidates=assignDice(pool);
    S.status='waiting_dice';
  }catch(e){
    dbg('ERROR: '+e.message);toast('エラー: '+e.message);
    S.status='waiting_dice';S.candidates=[];
  }
  save();render();
}

function selectRoute(die){
  if(!S||S.status!=='waiting_dice')return;
  const c=S.candidates.find(x=>x.dieValue===die);
  if(!c)return;
  S.legs.push({legNumber:S.legs.length+1,diceRoll:die,selected:c,
    status:'traveling',startedAt:new Date().toISOString(),completedAt:null});
  S.status='traveling';
  save();render();document.getElementById('scr').scrollTop=0;
}

function arrive(){
  if(!S||S.status!=='traveling')return;
  const leg=S.legs.at(-1);
  leg.status='completed';leg.completedAt=new Date().toISOString();
  S.currentLocation={...leg.selected.to};
  const d=distKm(S.currentLocation,S.destination);
  if(S.currentLocation.name===S.destination.name||d<1.0){
    S.status='completed';save();render();return;
  }
  toast('📍 到着！目的地まであと約'+Math.round(d)+'km');
  loadCandidates();
}

function endGame(){
  if(!confirm('ゲームを終了しますか？'))return;
  S=null;save();
  document.getElementById('orig').value='';
  document.getElementById('dest').value='';
  swTab('game');showSt('setup');
}
function resetGame(){
  S=null;save();
  document.getElementById('orig').value='';
  document.getElementById('dest').value='';
  showSt('setup');
}

/* ═══════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════ */
function showSt(id){
  ['setup','dice','travel','done'].forEach(s=>{
    const e=document.getElementById('st-'+s);if(e)e.style.display='none';
  });
  document.getElementById('st-'+id).style.display='block';
}

function render(){
  if(!S){showSt('setup');return;}
  if(S.status==='loading'){
    showSt('dice');renderPc();
    document.getElementById('clist').innerHTML=
      `<div class="loading"><div class="sp"></div><span>路線データ取得中…</span></div>`;
    return;
  }
  if(S.status==='waiting_dice'){showSt('dice');renderPc();renderList();return;}
  if(S.status==='traveling'){showSt('travel');renderTravel();return;}
  if(S.status==='completed'){
    showSt('done');
    const done=S.legs.filter(l=>l.status==='completed');
    const mins=done.reduce((s,l)=>s+(l.selected?.mins||0),0);
    const fare=done.reduce((s,l)=>s+(l.selected?.fare||0),0);
    const fd=Math.round(distKm(S.currentLocation,S.destination)*10)/10;
    document.getElementById('donetxt').innerHTML=
      `<b>${S.origin.name}</b> → <b>${S.destination.name}</b><br>`+
      `${done.length}レグ・推定${fmtMins(mins)}・合計${fmtFare(fare)}<br>`+
      `<span style="font-size:12px">残り${fd}km地点でゴール</span>`;
  }
}

function renderPc(){
  const d=Math.round(distKm(S.currentLocation,S.destination));
  const done=S.legs.filter(l=>l.status==='completed').length;
  document.getElementById('pc').innerHTML=
    `<div style="font-size:15px;font-weight:700">${S.origin.name} → ${S.destination.name}</div>
     <div style="font-size:13px;color:var(--am);margin-top:3px">📍 現在地: ${S.currentLocation.name}</div>
     <div style="font-size:11px;color:var(--dim);margin-top:2px">残り約 ${d}km ／ ${done}レグ完了</div>`;
  document.getElementById('time-info').textContent=
    isNight()?'🌙 夜間モード（夜行バス利用可）':'☀️ 昼間モード（夜行バスは20時から）';
}

function renderList(){
  const cands=S.candidates||[];
  if(!cands.length){
    document.getElementById('clist').innerHTML=
      `<div class="loading"><span style="color:var(--re)">候補が見つかりませんでした。デバッグログを確認してください。</span></div>`;
    return;
  }
  document.getElementById('clist').innerHTML=cands.map(c=>{
    const m=MODES[c.mode];
    const pct=Math.round(c.prog*100);
    return `<div class="crow">
      <div class="cbadge d${c.dieValue}">${c.dieValue}</div>
      <div class="cbody">
        <div class="cdest">${m.icon} ${c.to.name}</div>
        <div class="cmeta">${m.label} ／ <b>${Math.round(c.dist*10)/10}km</b> ／ <b>${fmtMins(c.mins)}</b> ／ <b>${fmtFare(c.fare)}</b>
          <span style="color:${pct>=0?'var(--gr)':'var(--re)'};font-size:11px"> ／ 進捗${pct>=0?'+':''}${pct}%</span>
        </div>
        ${c.note?`<div class="cnote">${c.note}</div>`:''}
      </div>
      <button class="cgo" onclick="selectRoute(${c.dieValue})">GO</button>
    </div>`;
  }).join('');
}

function renderTravel(){
  const leg=S.legs.at(-1);const c=leg.selected;const m=MODES[c.mode];
  const murl=`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(S.currentLocation.name)}&destination=${encodeURIComponent(c.to.name)}&travelmode=transit`;
  document.getElementById('confwrap').innerHTML=
    `<div class="conf">
       <div style="font-size:13px;font-weight:700;margin-bottom:5px">✅ 🎲${leg.diceRoll} 確定</div>
       <div style="font-size:16px;font-weight:700;margin-bottom:3px">${S.currentLocation.name} → ${c.to.name}</div>
       <div style="font-size:12px;color:var(--dim);margin-bottom:${c.note?'3':'10'}px">${m.icon} ${m.label} ／ ${Math.round(c.dist*10)/10}km ／ ${fmtMins(c.mins)} ／ ${fmtFare(c.fare)}</div>
       ${c.note?`<div style="font-size:11px;color:var(--dim);margin-bottom:10px">${c.note}</div>`:''}
       <a href="${murl}" target="_blank" rel="noopener"
          style="display:block;text-align:center;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:13px;text-decoration:none">
         🗺 Googleマップで開く →
       </a>
     </div>`;
  const done=S.legs.filter(l=>l.status==='completed');
  document.getElementById('thist').innerHTML=done.length
    ?[...done].reverse().map(l=>{
        const r=l.selected;const m2=MODES[r.mode];
        return `<div class="li">
          <div class="lih"><span style="font-size:11px;color:var(--dim)">レグ ${l.legNumber}</span><span style="font-size:13px">🎲${l.diceRoll}</span></div>
          <div style="font-size:13px">${m2.icon} → ${r.to.name}（${m2.label}・${Math.round(r.dist*10)/10}km・${fmtMins(r.mins)}・${fmtFare(r.fare)}）</div>
        </div>`;}).join('')
    :`<p style="font-size:13px;color:var(--dim)">まだ完了レグはありません</p>`;
}

/* LOG / SHARE / NAV */
function renderLog(){
  const el=document.getElementById('logc');
  if(!S||!S.legs.length){el.innerHTML=`<div style="text-align:center;padding:44px;color:var(--dim)">旅がまだ始まっていません</div>`;return;}
  el.innerHTML=`<p style="font-size:12px;color:var(--dim);margin-bottom:12px">${S.origin.name} → ${S.destination.name}</p>`+
    [...S.legs].reverse().map(l=>{
      const r=l.selected;const m=r?MODES[r.mode]:null;
      return `<div class="li">
        <div class="lih"><span style="font-size:11px;color:var(--dim)">レグ ${l.legNumber}</span><span style="font-size:13px;font-weight:700">🎲${l.diceRoll}</span></div>
        <div style="font-size:13px">${m?`${m.icon} → ${r.to.name}（${m.label}・${Math.round(r.dist*10)/10}km・${fmtMins(r.mins)}・${fmtFare(r.fare)}）`:'選択中…'}</div>
      </div>`;}).join('');
}

function doShare(){
  if(!S){toast('ゲームが開始されていません');return;}
  const d={v:8,on:S.origin.name,dn:S.destination.name,cn:S.currentLocation.name,
    legs:S.legs.slice(-5).map(l=>({n:l.legNumber,r:l.diceRoll,
      s:l.selected?{tn:l.selected.to.name,mode:l.selected.mode,
        dist:Math.round(l.selected.dist*10)/10,mins:l.selected.mins,fare:l.selected.fare}:null}))};
  const url=location.href.split('?')[0]+'?s='+btoa(unescape(encodeURIComponent(JSON.stringify(d))));
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(url).then(()=>toast('📋 URLをコピーしました')).catch(()=>showFb(url));
  else showFb(url);
}
function showFb(url){document.getElementById('shareout').innerHTML=`<div class="card"><p style="font-size:11px;word-break:break-all;line-height:1.7;color:var(--dim)">${url}</p></div>`;}

function swTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.querySelector(`[data-t="${t}"]`).classList.add('on');
  document.getElementById('pn-'+t).classList.add('on');
  if(t==='log')renderLog();
}

let _tt;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('show'),2800);}

// 設定
const BIAS_LABELS = {
  '-3':'まったり（全方向ゆるめ）',
  '-2':'やや緩め',
  '-1':'少し緩め',
  '0': '標準（1-3逆走 / 4-6前進）',
  '1': '少しハード',
  '2': 'ハード（逆走強め）',
  '3': '超ハード（強烈逆走 / 遠距離前進）',
};
const BIAS_DESCS = {
  '-3':'🎲1-3: 横移動も可 / 🎲4-6: 少し前進でOK',
  '-2':'🎲1-3: 進捗-8%以下 / 🎲4-6: 進捗+0%以上',
  '-1':'🎲1-3: 進捗-4%以下 / 🎲4-6: 進捗+2%以上',
  '0': '🎲1-3: 進捗0%以下（逆走） / 🎲4-6: 進捗+5%以上',
  '1': '🎲1-3: 進捗-8%以下 / 🎲4-6: 進捗+10%以上',
  '2': '🎲1-3: 進捗-16%以下 / 🎲4-6: 進捗+15%以上',
  '3': '🎲1-3: 進捗-24%以下 / 🎲4-6: 進捗+20%以上',
};
function updateBiasLabel(){
  const v=document.getElementById('bias-slider').value;
  document.getElementById('bias-label').textContent=BIAS_LABELS[v]||v;
  document.getElementById('bias-desc').textContent=BIAS_DESCS[v]||'';
}
function openSettings(){
  document.getElementById('bias-slider').value=_bias;
  updateBiasLabel();
  document.getElementById('cfg-overlay').style.display='flex';
}
function closeSettings(){document.getElementById('cfg-overlay').style.display='none';}
function saveSettings(){
  _bias=parseInt(document.getElementById('bias-slider').value)||0;
  localStorage.setItem('saikoro_bias',_bias);
  closeSettings();
  toast(`設定を保存しました（${BIAS_LABELS[_bias]}）`);
}

async function checkApi(){
  const el=document.getElementById('apistatus');
  try{
    const hits=await fetchByName('浜松');
    el.textContent=hits.length?'Heartrails ✅':'API ⚠️';
    el.style.color=hits.length?'var(--gr)':'var(--re)';
    dbg(`API確認: fetchByName("浜松") → ${hits.length}件 (路線: ${[...new Set(hits.map(h=>h.line))].join(', ')})`);
  }catch{el.textContent='API ⚠️';el.style.color='var(--re)';}
}

// 設定読み込み
_bias = parseInt(localStorage.getItem('saikoro_bias')||'0');
load();render();checkApi();
</script>
