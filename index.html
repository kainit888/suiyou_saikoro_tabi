<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e1a">
<title>🎲 サイコロ旅</title>
<style>
:root{
  --bg:#0f0e1a;--s1:#181727;--s2:#201f32;--bd:#2c2b44;
  --tx:#e2ddf0;--dim:#7a768f;--am:#e0a020;--re:#d94040;--gr:#2eb870;
  --r:12px;--font:'Hiragino Sans','Noto Sans JP',sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:15px}
button,input{font-family:var(--font)}
#app{display:flex;flex-direction:column;height:100dvh}
#hdr{flex-shrink:0;padding:calc(10px + var(--sat)) 14px 10px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
#tabs{flex-shrink:0;display:flex;background:var(--bg);border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:10px 4px;background:none;border:none;color:var(--dim);font-size:13px;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s}
.tab.on{color:var(--am);border-bottom-color:var(--am)}
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pn{display:none;padding:13px 12px calc(32px + var(--sab))}
.pn.on{display:block}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:12px}
.lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.g{margin-bottom:11px}
.g label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.row{display:flex;gap:7px;align-items:center}
input[type=text]{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
input:focus{border-color:var(--am)}
.ibtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:15px;flex-shrink:0;cursor:pointer}
.btn{display:block;width:100%;padding:12px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;margin-bottom:8px;cursor:pointer;text-align:center;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--am);color:#0f0e1a}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-ok{background:var(--gr);color:#0f0e1a}
.pc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
/* candidate rows */
.crow{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:11px 12px;margin-bottom:9px}
.cbadge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.d1{background:rgba(217,64,64,.25);color:#ff8080}
.d2{background:rgba(220,100,20,.25);color:#ffaa60}
.d3{background:rgba(200,160,0,.25);color:#ffcc40}
.d4{background:rgba(46,184,112,.25);color:#60eeaa}
.d5{background:rgba(64,128,224,.25);color:#80b4ff}
.d6{background:rgba(148,60,240,.25);color:#cc90ff}
.cbody{flex:1;min-width:0}
.cdest{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:12px;color:var(--dim);line-height:1.7}
.cmeta b{color:var(--tx);font-weight:500}
.cgo{flex-shrink:0;background:var(--am);color:#0f0e1a;border:none;border-radius:8px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s}
.cgo:active{transform:scale(.93)}
/* confirmed */
.conf{border-left:3px solid var(--am);background:var(--s1);border-radius:0 var(--r) var(--r) 0;border-right:1px solid var(--bd);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:13px;margin-bottom:12px}
/* log */
.li{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.lih{display:flex;justify-content:space-between;margin-bottom:2px}
/* loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 16px;gap:14px;color:var(--dim);font-size:14px}
.sp{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--am);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.done{text-align:center;padding:40px 14px}
.done .big{font-size:52px;margin-bottom:12px}
#toast{position:fixed;bottom:calc(64px + var(--sab));left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);color:var(--tx);padding:9px 20px;border-radius:20px;font-size:13px;border:1px solid var(--bd);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">
  <div id="hdr">
    <span style="font-size:18px;font-weight:700">🎲 サイコロ旅</span>
    <span id="apistatus" style="font-size:11px;color:var(--dim)">…</span>
  </div>
  <div id="tabs">
    <button class="tab on" data-t="game" onclick="swTab('game')">📍 ゲーム</button>
    <button class="tab" data-t="log"  onclick="swTab('log')">📜 ログ</button>
    <button class="tab" data-t="share" onclick="swTab('share')">📤 共有</button>
  </div>
  <div id="scr">
    <div id="pn-game" class="pn on">
      <div id="st-setup">
        <div class="card">
          <p style="font-size:12px;color:var(--dim);line-height:1.6;margin-bottom:12px">
            ⚠️ 出発地・目的地は <b style="color:var(--tx)">駅名を正確に</b> 入力してください。<br>
            例: <b style="color:var(--am)">浜松駅</b>　<b style="color:var(--am)">札幌駅</b>　<b style="color:var(--am)">新函館北斗駅</b><br>
            都市名だけ（「北海道」等）では到着判定が正しく動きません。
          </p>
          <div class="g">
            <label>出発地（駅名）</label>
            <div class="row">
              <input type="text" id="orig" placeholder="例: 浜松駅" oninput="onInputChange('orig')">
              <button class="ibtn" onclick="doGPS()">📍</button>
            </div>
            <div id="orig-confirm" style="font-size:11px;color:var(--gr);margin-top:4px;min-height:16px"></div>
          </div>
          <div class="g" style="margin-bottom:0">
            <label>目的地（駅名）</label>
            <input type="text" id="dest" placeholder="例: 札幌駅" oninput="onInputChange('dest')">
            <div id="dest-confirm" style="font-size:11px;color:var(--gr);margin-top:4px;min-height:16px"></div>
          </div>
        </div>
        <button class="btn btn-p" onclick="startGame()">🎲 ゲーム開始！</button>
      </div>
      <div id="st-dice" style="display:none">
        <div id="pc" class="pc"></div>
        <div class="lbl">ダイスを振って選ぶ</div>
        <div id="clist"></div>
        <button class="btn btn-s" style="margin-top:4px" onclick="endGame()">🏁 終了</button>
      </div>
      <div id="st-travel" style="display:none">
        <div id="confwrap"></div>
        <button class="btn btn-ok" onclick="arrive()">📍 到着！次のダイスへ</button>
        <div class="lbl" style="margin-top:14px">これまでの旅路</div>
        <div id="thist"></div>
      </div>
      <div id="st-done" style="display:none">
        <div class="done">
          <div class="big">🎉</div>
          <h2 style="margin-bottom:8px">ゴール！</h2>
          <p id="donetxt" style="font-size:14px;color:var(--dim);line-height:1.6;margin-bottom:22px"></p>
          <button class="btn btn-p" onclick="resetGame()">🎲 新しい旅へ</button>
        </div>
      </div>
    </div>
    <div id="pn-log" class="pn"><div id="logc"></div></div>
    <div id="pn-share" class="pn">
      <div class="card">
        <h3 style="margin-bottom:10px">この旅を共有</h3>
        <p style="font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:14px">旅の状態をURLにエンコードします。受け取った側は読み取り専用で閲覧できます。</p>
        <button class="btn btn-p" onclick="doShare()">🔗 共有URLをコピー</button>
      </div>
      <div id="shareout"></div>
    </div>
  </div>
</div>
<script>
'use strict';

/* ══════════════════════════════════════════════════════
   STATIC ROUTES  フェリー・夜行バス
   （公開APIが存在しないため静的データで管理）
   [乗り場名, lat, lng, 目的地名, lat, lng, 所要min, 会社名]
   ══════════════════════════════════════════════════════ */
const FERRY = [

const NIGHTBUS = [
  ['浜松駅',  34.7108,137.7261, '東京駅',  35.6812,139.7671,  210,'遠鉄バス他'],
  ['浜松駅',  34.7108,137.7261, '大阪駅',  34.7026,135.4959,  360,'Willer他'],

  ['名古屋駅',35.1709,136.8815, '大阪駅',  34.7026,135.4959,  180,'名鉄バス他'],
  ['名古屋駅',35.1709,136.8815, '仙台駅',  38.2682,140.8694,  480,'Willer他'],
  ['大阪駅',  34.7026,135.4959, '東京駅',  35.6812,139.7671,  480,'Willer他'],
  ['大阪駅',  34.7026,135.4959, '仙台駅',  38.2682,140.8694,  600,'Willer他'],
  ['大阪駅',  34.7026,135.4959, '福岡駅',  33.5898,130.4201,  480,'西鉄バス他'],
  ['東京駅',  35.6812,139.7671, '仙台駅',  38.2682,140.8694,  270,'JRバス他'],
  ['東京駅',  35.6812,139.7671, '青森駅',  40.8246,140.7400,  480,'JRバス他'],
  ['東京駅',  35.6812,139.7671, '大阪駅',  34.7026,135.4959,  480,'Willer他'],

/* ══════════════════════════════════════════════════════
   MODE CONFIG
   新幹線・飛行機・徒歩は除外
   ══════════════════════════════════════════════════════ */
const MODES = {
  local_bus:    { spd:22,  label:'路線バス',    icon:'🚌', maxKm:60,
    fare: d => Math.round((200 + d*14) / 10) * 10 },
  local_train:  { spd:42,  label:'在来線(鈍行)',icon:'🚃', maxKm:180,
    fare: d => Math.round((150 + d*16.2) / 10) * 10 },
  express_train:{ spd:90,  label:'特急',        icon:'🚃', maxKm:500,
    fare: d => Math.round((150 + d*16.2 + 1800) / 100) * 100 },
  highway_bus:  { spd:65,  label:'高速バス',    icon:'🚌', maxKm:750,
    fare: d => Math.round((600 + d*4) / 100) * 100 },
  rental_car:   { spd:65,  label:'レンタカー',  icon:'🚗', maxKm:600,
    fare: d => Math.round((5000 + d*20) / 500) * 500 },
  night_bus:    { spd:55,  label:'夜行バス',    icon:'🌙', maxKm:999,
    fare: d => Math.round((3000 + d*3) / 500) * 500 },
  ferry:        { spd:25,  label:'フェリー',    icon:'⛴',  maxKm:9999,
    fare: d => Math.round((3000 + d*8) / 500) * 500 },
};

const BOARD = {local_bus:5,local_train:8,express_train:15,highway_bus:15,rental_car:20,night_bus:30,ferry:60};

function calcMins(dist, mode) {
  return Math.max(3, Math.round(dist / MODES[mode].spd * 60 + (BOARD[mode]||0)));
}
function fmtMins(m) {
  return m < 60 ? m+'分' : Math.floor(m/60)+'時間'+(m%60 ? (m%60)+'分' : '');
}
function fmtFare(y) {
  return y === 0 ? '無料' : '約'+y.toLocaleString()+'円';
}

/* ══════════════════════════════════════════════════════
   GEO
   ══════════════════════════════════════════════════════ */
function distKm(a,b){
  const R=6371,φ1=a.lat*Math.PI/180,φ2=b.lat*Math.PI/180,
    dφ=(b.lat-a.lat)*Math.PI/180,dλ=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function bearing(a,b){
  const dL=(b.lng-a.lng)*Math.PI/180,φ1=a.lat*Math.PI/180,φ2=b.lat*Math.PI/180;
  return Math.atan2(Math.sin(dL)*Math.cos(φ2),Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dL))*180/Math.PI;
}
function angleDiff(from, to, dest) {
  // 0° = 目的地方向 / 180° = 真逆
  const db = bearing(from, dest), cb = bearing(from, to);
  return Math.abs(((db - cb + 540) % 360) - 180);
}

/* ══════════════════════════════════════════════════════
   HEARTRAILS
   ══════════════════════════════════════════════════════ */
const _cache = new Map();
async function fetchNearby(lat, lng) {
  const k = `${lat.toFixed(2)},${lng.toFixed(2)}`;
  if (_cache.has(k)) return _cache.get(k);
  try {
    const url = `https://express.heartrails.com/api/json?method=getStations&x=${lng}&y=${lat}&distance=300`;
    const r = await Promise.race([fetch(url), new Promise((_,j)=>setTimeout(()=>j(new Error('timeout')),12000))]);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const list = (d?.response?.station || []).map(s=>({
      name: s.name+'駅', lat: parseFloat(s.y), lng: parseFloat(s.x),
      line: s.line, geo_dist: parseFloat(s.geo_distance||0),
    }));
    _cache.set(k, list);
    return list;
  } catch(e) { console.warn('[fetchNearby]', e.message); return []; }
}

/* ══════════════════════════════════════════════════════
   GEOCODE
   ══════════════════════════════════════════════════════ */
const GEO_FB = {
  '北海道':{lat:43.0687,lng:141.3508},'札幌':{lat:43.0687,lng:141.3508},
  '函館':{lat:41.7737,lng:140.7268},'旭川':{lat:43.7700,lng:142.3650},
  '釧路':{lat:42.9849,lng:144.3820},'青森':{lat:40.8246,lng:140.7400},
  '仙台':{lat:38.2682,lng:140.8694},'秋田':{lat:39.7196,lng:140.1023},
  '盛岡':{lat:39.7036,lng:141.1527},'新潟':{lat:37.9127,lng:139.0595},
  '長野':{lat:36.6448,lng:138.1880},'金沢':{lat:36.5784,lng:136.6481},
  '富山':{lat:36.7003,lng:137.2133},'東京':{lat:35.6812,lng:139.7671},
  '横浜':{lat:35.4657,lng:139.6221},'千葉':{lat:35.6073,lng:140.1063},
  '大宮':{lat:35.9061,lng:139.6231},'水戸':{lat:36.3418,lng:140.4469},
  '名古屋':{lat:35.1709,lng:136.8815},'浜松':{lat:34.7108,lng:137.7261},
  '静岡':{lat:34.9769,lng:138.3831},'大阪':{lat:34.7026,lng:135.4959},
  '京都':{lat:34.9850,lng:135.7582},'神戸':{lat:34.6790,lng:135.1950},
  '広島':{lat:34.3853,lng:132.4553},'岡山':{lat:34.6552,lng:133.9195},
  '福岡':{lat:33.5904,lng:130.4017},'博多':{lat:33.5898,lng:130.4201},
  '熊本':{lat:32.7903,lng:130.7460},'鹿児島':{lat:31.5794,lng:130.5571},
  '那覇':{lat:26.2124,lng:127.6809},'沖縄':{lat:26.2124,lng:127.6809},
};
async function geocode(text) {
  const q = text.replace(/駅$/,'').trim();
  try {
    const url = `https://express.heartrails.com/api/json?method=getStations&name=${encodeURIComponent(q)}`;
    const r = await Promise.race([fetch(url), new Promise((_,j)=>setTimeout(()=>j(),8000))]);
    if (r.ok) {
      const d = await r.json();
      const st = d?.response?.station;
      if (st?.length) return {name:st[0].name+'駅', lat:parseFloat(st[0].y), lng:parseFloat(st[0].x)};
    }
  } catch(e) { console.warn('[geocode]', e.message); }
  for (const [k,v] of Object.entries(GEO_FB)) {
    if (text.includes(k)||k.includes(q)) return {name:text, lat:v.lat, lng:v.lng};
  }
  return null;
}

/* ══════════════════════════════════════════════════════
   GPS
   ══════════════════════════════════════════════════════ */
async function doGPS() {
  if (!navigator.geolocation) { toast('GPSが使えません'); return; }
  toast('📍 GPS取得中…');
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:la, longitude:ln} = pos.coords;
    try {
      const url = `https://express.heartrails.com/api/json?method=getStations&x=${ln}&y=${la}&distance=5`;
      const r = await Promise.race([fetch(url), new Promise((_,j)=>setTimeout(()=>j(),6000))]);
      const d = await r.json();
      const st = d?.response?.station;
      const nm = st?.length ? st[0].name+'駅' : `${la.toFixed(4)},${ln.toFixed(4)}`;
      document.getElementById('orig').value = nm; toast('📍 '+nm);
    } catch { document.getElementById('orig').value=`${la.toFixed(4)},${ln.toFixed(4)}`; toast('📍 座標を取得'); }
  }, () => toast('GPS取得に失敗しました'));
}

/* ══════════════════════════════════════════════════════
   MASTER POOL BUILDER
   ──────────────────────────────────────────────────────
   ① Heartrails で現在地から300km圏の全駅を取得
   ② 各駅 × 全手段（距離レンジ内）でエントリを生成
   ③ フェリー・夜行バスの静的ルートを追加
   → これが「その地点から行ける全候補リスト」になる
   ══════════════════════════════════════════════════════ */
async function buildMasterPool(from, dest) {
  const stations = await fetchNearby(from.lat, from.lng);
  const pool = [];

  // Heartrails駅 × 全手段
  for (const st of stations) {
    const dist = distKm(from, st);
    if (dist < 0.3) continue; // 現在地と同じ場所は除外
    const angle = angleDiff(from, st, dest);

    for (const [mode, cfg] of Object.entries(MODES)) {
      if (mode === 'night_bus' || mode === 'ferry') continue; // 静的データで別途追加
      if (dist > cfg.maxKm) continue;
      pool.push({
        to:    {name:st.name, lat:st.lat, lng:st.lng},
        mode,  dist, angle,
        mins:  calcMins(dist, mode),
        fare:  cfg.fare(dist),
        note:  null,
      });
    }
  }

  // フェリー静的ルート
  for (const [fn,fla,fln,tn,tla,tln,mins,co] of FERRY) {
    const boardDist = distKm(from, {lat:fla, lng:fln});
    if (boardDist > 50) continue; // 乗り場まで50km以内
    const to = {name:tn, lat:tla, lng:tln};
    const dist = distKm(from, to);
    const angle = angleDiff(from, to, dest);
    pool.push({to, mode:'ferry', dist, angle, mins, fare:MODES.ferry.fare(dist), note:`${co}（${fn}発）`});
  }

  // 夜行バス静的ルート
  for (const [fn,fla,fln,tn,tla,tln,mins,co] of NIGHTBUS) {
    const boardDist = distKm(from, {lat:fla, lng:fln});
    if (boardDist > 40) continue; // 乗り場まで40km以内
    const to = {name:tn, lat:tla, lng:tln};
    const dist = distKm(from, to);
    const angle = angleDiff(from, to, dest);
    pool.push({to, mode:'night_bus', dist, angle, mins, fare:MODES.night_bus.fare(dist), note:`${co}（${fn}発）`});
  }

  console.log(`[pool] ${stations.length}駅 → ${pool.length}エントリ`);
  return pool;
}

/* ══════════════════════════════════════════════════════
   CANDIDATE PICKER
   ──────────────────────────────────────────────────────
   マスタープールから出目1〜6の条件で1件ずつ選出。
   全6件の行き先が被らないよう usedDests で管理する。

   出目の方向定義（angleDiff: 0=目的地方向 180=真逆）:
   1: 真逆方向（angle最大）
   2: 逆方向ランダム（angle > 90°）
   3: 45°ずれランダム（angle 20〜70°）
   4: 30°ずれランダム（angle 10〜50°）
   5: 前進・時間がかかる手段（angle < 90°, mins優先）
   6: 前進・快適な手段（angle < 90°, 速い手段優先）
   ══════════════════════════════════════════════════════ */

// 出目ごとの角度帯（段階的フォールバック付き）
const BANDS = {
  1: [[150,180],[120,180],[90,180],[0,180]],
  2: [[90,180], [70,180], [50,180],[0,180]],
  3: [[20,70],  [10,80],  [5,90], [0,180]],
  4: [[10,50],  [5,60],   [0,70], [0,180]],
  5: [[0,90],   [0,110],  [0,140],[0,180]],
  6: [[0,90],   [0,110],  [0,140],[0,180]],
};

// 速い手段ほど高スコア
const SPEED_RANK = {express_train:6, highway_bus:5, rental_car:5, night_bus:4, ferry:3, local_train:2, local_bus:1};

function pickOne(pool, die, usedDests) {
  for (const [minA, maxA] of BANDS[die]) {
    // この帯に入る & まだ使われていない行き先
    let candidates = pool.filter(c => c.angle >= minA && c.angle <= maxA && !usedDests.has(c.to.name));
    if (candidates.length === 0) continue;

    // 出目ごとのソート
    if (die === 1) {
      candidates.sort((a,b) => b.angle - a.angle); // 真逆: angle最大
    } else if (die === 5) {
      candidates.sort((a,b) => b.mins - a.mins);   // 遅い前進: mins最大
    } else if (die === 6) {
      candidates.sort((a,b) => (SPEED_RANK[b.mode]||0) - (SPEED_RANK[a.mode]||0)); // 快適: 速い手段優先
    } else {
      // 2,3,4: ランダム（シャッフル）
      for (let i = candidates.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [candidates[i],candidates[j]] = [candidates[j],candidates[i]];
      }
    }

    return candidates[0];
  }
  return null;
}

function assignAllDice(pool) {
  const usedDests = new Set();
  const result = [];

  for (let die = 1; die <= 6; die++) {
    const picked = pickOne(pool, die, usedDests);
    if (picked) {
      usedDests.add(picked.to.name);
      result.push({...picked, dieValue: die});
    }
  }
  return result;
}

/* ══════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════ */
let S = null;
const SK = 'saikoro_v6';
function save() { try { S ? localStorage.setItem(SK,JSON.stringify(S)) : localStorage.removeItem(SK); } catch{} }
function load() { try { const r=localStorage.getItem(SK); if(r) S=JSON.parse(r); } catch{S=null;} }

/* ══════════════════════════════════════════════════════
   GAME LOGIC
   ══════════════════════════════════════════════════════ */
// 入力欄の変化時にリアルタイムでジオコードして確認表示
let _gcTimer = {};
function onInputChange(field) {
  const confirmEl = document.getElementById(field+'-confirm');
  confirmEl.textContent = '';
  const val = document.getElementById(field).value.trim();
  if (!val) return;
  clearTimeout(_gcTimer[field]);
  _gcTimer[field] = setTimeout(async () => {
    confirmEl.textContent = '検索中…';
    confirmEl.style.color = 'var(--dim)';
    const result = await geocode(val);
    if (result) {
      confirmEl.textContent = '✅ ' + result.name + '（' + result.lat.toFixed(4) + ', ' + result.lng.toFixed(4) + '）';
      confirmEl.style.color = 'var(--gr)';
    } else {
      confirmEl.textContent = '⚠️ 見つかりません。駅名を確認してください';
      confirmEl.style.color = 'var(--re)';
    }
  }, 600);
}

async function startGame() {
  const on = document.getElementById('orig').value.trim();
  const dn = document.getElementById('dest').value.trim();
  if (!on||!dn) { toast('出発地と目的地を入力してください'); return; }
  toast('🔍 場所を検索中…');
  const [origin, dest] = await Promise.all([geocode(on), geocode(dn)]);
  if (!origin) { toast(`「${on}」が見つかりません。正確な駅名を入力してください`); return; }
  if (!dest)   { toast(`「${dn}」が見つかりません。正確な駅名を入力してください`); return; }

  // 目的地を確定済みの情報として保持（名前・座標を明示）
  S = {id:'s'+Date.now().toString(36), status:'loading',
    origin, destination:dest, currentLocation:{...origin},
    startedAt:new Date().toISOString(), legs:[], candidates:[]};
  save(); render();
  await loadCandidates();
}

async function loadCandidates() {
  if (!S) return;
  S.status = 'loading'; render();
  try {
    const pool = await buildMasterPool(S.currentLocation, S.destination);
    S._pool = pool; // デバッグ用
    S.candidates = assignAllDice(pool);
    S.status = 'waiting_dice';
  } catch(e) {
    console.error('[loadCandidates]', e);
    toast('候補取得エラー: '+e.message);
    S.status = 'waiting_dice';
    S.candidates = [];
  }
  save(); render();
}

function selectRoute(dieValue) {
  if (!S || S.status !== 'waiting_dice') return;
  const cand = S.candidates.find(c => c.dieValue === dieValue);
  if (!cand) return;
  S.legs.push({legNumber:S.legs.length+1, diceRoll:dieValue, selected:cand,
    status:'traveling', startedAt:new Date().toISOString(), completedAt:null});
  S.status = 'traveling';
  save(); render(); document.getElementById('scr').scrollTop = 0;
}

function arrive() {
  if (!S || S.status !== 'traveling') return;
  const leg = S.legs.at(-1);
  leg.status = 'completed'; leg.completedAt = new Date().toISOString();
  S.currentLocation = {...leg.selected.to};
  const dstDist = distKm(S.currentLocation, S.destination);
  const namMatch = S.currentLocation.name === S.destination.name;
  if (namMatch || dstDist < 1.0) {
    S.status = 'completed'; save(); render(); return;
  }
  // 残り距離をトーストで表示
  toast('📍 到着！目的地まであと約' + Math.round(dstDist) + 'km');
  loadCandidates();
}

function endGame() {
  if (!confirm('ゲームを終了しますか？')) return;
  S = null; save();
  document.getElementById('orig').value = '';
  document.getElementById('dest').value = '';
  swTab('game'); showSt('setup');
}
function resetGame() {
  S = null; save();
  document.getElementById('orig').value = '';
  document.getElementById('dest').value = '';
  showSt('setup');
}

/* ══════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════ */
function showSt(id) {
  ['setup','dice','travel','done'].forEach(s=>{
    const e=document.getElementById('st-'+s); if(e) e.style.display='none';
  });
  document.getElementById('st-'+id).style.display='block';
}

function render() {
  if (!S) { showSt('setup'); return; }

  if (S.status === 'loading') {
    showSt('dice');
    renderPc();
    document.getElementById('clist').innerHTML =
      `<div class="loading"><div class="sp"></div><span>Heartrailsから駅データ取得中…</span></div>`;
    return;
  }

  if (S.status === 'waiting_dice') {
    showSt('dice'); renderPc(); renderList(); return;
  }
  if (S.status === 'traveling') {
    showSt('travel'); renderTravel(); return;
  }
  if (S.status === 'completed') {
    showSt('done');
    const done = S.legs.filter(l=>l.status==='completed');
    const mins = done.reduce((s,l)=>s+(l.selected?.mins||0),0);
    const fare = done.reduce((s,l)=>s+(l.selected?.fare||0),0);
    const finalDist = Math.round(distKm(S.currentLocation, S.destination)*10)/10;
    document.getElementById('donetxt').innerHTML =
      `<b>${S.origin.name}</b> → <b>${S.destination.name}</b><br>`+
      `${done.length}レグ・推定${fmtMins(mins)}・合計${fmtFare(fare)}<br>`+
      `<span style="font-size:12px;color:var(--dim)">目的地まで残り${finalDist}km地点でゴール</span>`;
  }
}

function renderPc() {
  const d = Math.round(distKm(S.currentLocation, S.destination));
  const done = S.legs.filter(l=>l.status==='completed').length;
  document.getElementById('pc').innerHTML =
    `<div style="font-size:15px;font-weight:700">${S.origin.name} → ${S.destination.name}</div>
     <div style="font-size:13px;color:var(--am);margin-top:3px">📍 現在地: ${S.currentLocation.name}</div>
     <div style="font-size:11px;color:var(--dim);margin-top:2px">残り約 ${d} km ／ ${done} レグ完了</div>
     <div style="font-size:11px;color:var(--dim);margin-top:1px">🎯 目標: ${S.destination.name}（${S.destination.lat.toFixed(4)}, ${S.destination.lng.toFixed(4)}）</div>`;
}

function renderList() {
  const cands = S.candidates || [];
  if (!cands.length) {
    document.getElementById('clist').innerHTML =
      `<div class="loading"><span style="color:var(--re)">候補が見つかりませんでした（Heartrails APIを確認してください）</span></div>`;
    return;
  }
  document.getElementById('clist').innerHTML = cands.map(c => {
    const m = MODES[c.mode];
    const noteHtml = c.note ? `<div style="font-size:11px;color:var(--dim);opacity:.8">${c.note}</div>` : '';
    return `<div class="crow">
      <div class="cbadge d${c.dieValue}">${c.dieValue}</div>
      <div class="cbody">
        <div class="cdest">${m.icon} ${c.to.name}</div>
        <div class="cmeta">
          ${m.label} ／ <b>${Math.round(c.dist*10)/10}km</b> ／ <b>${fmtMins(c.mins)}</b> ／ <b>${fmtFare(c.fare)}</b>
        </div>
        ${noteHtml}
      </div>
      <button class="cgo" onclick="selectRoute(${c.dieValue})">GO</button>
    </div>`;
  }).join('');
}

function renderTravel() {
  const leg = S.legs.at(-1);
  const c = leg.selected;
  const m = MODES[c.mode];
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(S.currentLocation.name)}&destination=${encodeURIComponent(c.to.name)}&travelmode=transit`;
  document.getElementById('confwrap').innerHTML =
    `<div class="conf">
       <div style="font-size:13px;font-weight:700;margin-bottom:5px">✅ 🎲${leg.diceRoll} 確定</div>
       <div style="font-size:16px;font-weight:700;margin-bottom:3px">${S.currentLocation.name} → ${c.to.name}</div>
       <div style="font-size:12px;color:var(--dim);margin-bottom:${c.note?'3':'10'}px">${m.icon} ${m.label} ／ ${Math.round(c.dist*10)/10}km ／ ${fmtMins(c.mins)} ／ ${fmtFare(c.fare)}</div>
       ${c.note?`<div style="font-size:11px;color:var(--dim);margin-bottom:10px">${c.note}</div>`:''}
       <a href="${mapsUrl}" target="_blank" rel="noopener"
          style="display:block;text-align:center;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:13px;text-decoration:none">
         🗺 Googleマップで開く →
       </a>
     </div>`;
  const done = S.legs.filter(l=>l.status==='completed');
  document.getElementById('thist').innerHTML = done.length
    ? [...done].reverse().map(l => {
        const r=l.selected; const m2=MODES[r.mode];
        return `<div class="li">
          <div class="lih"><span style="font-size:11px;color:var(--dim)">レグ ${l.legNumber}</span><span style="font-size:13px">🎲${l.diceRoll}</span></div>
          <div style="font-size:13px">${m2.icon} → ${r.to.name}（${m2.label}・${Math.round(r.dist*10)/10}km・${fmtMins(r.mins)}・${fmtFare(r.fare)}）</div>
        </div>`;}).join('')
    : `<p style="font-size:13px;color:var(--dim)">まだ完了レグはありません</p>`;
}

/* ══════════════════════════════════════════════════════
   LOG
   ══════════════════════════════════════════════════════ */
function renderLog() {
  const el = document.getElementById('logc');
  if (!S||!S.legs.length) { el.innerHTML=`<div style="text-align:center;padding:44px 12px;color:var(--dim)">旅がまだ始まっていません</div>`; return; }
  el.innerHTML = `<p style="font-size:12px;color:var(--dim);margin-bottom:12px">${S.origin.name} → ${S.destination.name}</p>`+
    [...S.legs].reverse().map(l => {
      const r=l.selected; const m=r?MODES[r.mode]:null;
      return `<div class="li">
        <div class="lih"><span style="font-size:11px;color:var(--dim)">レグ ${l.legNumber}</span><span style="font-size:13px;font-weight:700">🎲${l.diceRoll}</span></div>
        <div style="font-size:13px">${m?`${m.icon} → ${r.to.name}（${m.label}・${Math.round(r.dist*10)/10}km・${fmtMins(r.mins)}・${fmtFare(r.fare)}）`:'選択中…'}</div>
      </div>`;}).join('');
}

/* ══════════════════════════════════════════════════════
   SHARE
   ══════════════════════════════════════════════════════ */
function doShare() {
  if (!S) { toast('ゲームが開始されていません'); return; }
  const d={v:6,on:S.origin.name,dn:S.destination.name,cn:S.currentLocation.name,
    legs:S.legs.slice(-5).map(l=>({n:l.legNumber,r:l.diceRoll,
      s:l.selected?{tn:l.selected.to.name,mode:l.selected.mode,
        dist:Math.round(l.selected.dist*10)/10,mins:l.selected.mins,fare:l.selected.fare}:null}))};
  const url=location.href.split('?')[0]+'?s='+btoa(unescape(encodeURIComponent(JSON.stringify(d))));
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(url).then(()=>toast('📋 URLをコピーしました')).catch(()=>showShareFb(url));
  else showShareFb(url);
}
function showShareFb(url) {
  document.getElementById('shareout').innerHTML=`<div class="card"><div class="lbl">共有URL</div><p style="font-size:11px;word-break:break-all;line-height:1.7;color:var(--dim)">${url}</p></div>`;
}

/* TAB NAV */
function swTab(t) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.querySelector(`[data-t="${t}"]`).classList.add('on');
  document.getElementById('pn-'+t).classList.add('on');
  if (t==='log') renderLog();
}

/* TOAST */
let _tt;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('show'),2800);}

/* API health check */
async function checkApi() {
  const el = document.getElementById('apistatus');
  try {
    const r = await Promise.race([fetch('https://express.heartrails.com/api/json?method=getStations&name=浜松'), new Promise((_,j)=>setTimeout(()=>j(),5000))]);
    el.textContent = r.ok ? 'Heartrails ✅' : 'API ⚠️';
    el.style.color = r.ok ? 'var(--gr)' : 'var(--re)';
  } catch { el.textContent='API ⚠️'; el.style.color='var(--re)'; }
}

/* INIT */
load(); render(); checkApi();
</script>
